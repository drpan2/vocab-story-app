"level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "drinked", "pastParticipleForm": "drinked"}, {"word": "warm", "pos": "adj./v.", "zh": "溫暖的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "warmed", "pastParticipleForm": "warmed"}, {"word": "water", "pos": "n./v.", "zh": "水", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "watered", "pastParticipleForm": "watered"}, {"word": "touch", "pos": "n./v.", "zh": "觸碰", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "touched", "pastParticipleForm": "touched"}, {"word": "tired", "pos": "adj.", "zh": "疲勞的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26}, {"word": "she (her, hers, herself)", "pos": "pron.", "zh": "她（她的，她的，她自己）", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26}, {"word": "still", "pos": "adv./adj.", "zh": "仍然", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 27, "pastForm": "stilled", "pastParticipleForm": "stilled"}, {"word": "stand", "pos": "v./n.", "zh": "站立", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 27, "pastForm": "stood", "pastParticipleForm": "stood"}, {"word": "tall", "pos": "adj.", "zh": "高的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 27}, {"word": "own", "pos": "adj./pron./v.", "zh": "自己的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 27, "pastForm": "owned", "pastParticipleForm": "owned"}, {"word": "pale", "pos": "adj.", "zh": "蒼白", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 27}, {"word": "proud", "pos": "adj.", "zh": "自豪的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 27}], "extraHighlightWords": [], "sentences": [{"en": "Room 306 had an old piano in the corner that nobody had played in years, next to a shelf of dusty music books.", "zh": "306教室的角落有一台好幾年沒人彈過的舊鋼琴，旁邊是一排布滿灰塵的樂譜書架。"}, {"en": "Someone had once left a violin case there too, though nobody remembered whose it was.", "zh": "曾經也有人留下一個小提琴盒子在那裡，但沒有人記得是誰的。"}, {"en": "The note was the shortest one yet, and also the strangest: \"Room 306. Listen.\"", "zh": "這張紙條是目前為止最短的一張，也是最奇怪的一張：「306教室，聽。」"}, {"en": "\"Listen to what?\" Bernice asked, reading it three times.", "zh": "Bernice 把它讀了三遍問：「聽什麼？」"}, {"en": "Room 306 was an ordinary classroom, used for extra classes in the afternoon, empty most other times.", "zh": "306教室是一間普通教室，下午用來上課後輔導課，其他時間大多是空的。"}, {"en": "They walked past it after school and heard nothing at all.", "zh": "放學後他們經過那裡，什麼都沒聽到。"}, {"en": "\"Maybe the note is wrong,\" Coco said. \"Or maybe we're checking at the wrong time.\"", "zh": "Coco 說：「也許紙條寫錯了，或者我們查的時間不對。」"}, {"en": "Bernice asked around and found a student who used the room for her club meeting every Tuesday.", "zh": "Bernice 到處問，找到一個每個星期二在那間教室開社團會議的學生。"}, {"en": "\"There's a sound sometimes,\" the student said. \"Around four o'clock. Like someone playing music, very quietly.\"", "zh": "那個學生說：「有時候會有聲音，大概四點左右，好像有人在放音樂，聲音很小。」"}, {"en": "\"Does it happen every day?\" Bernice asked.", "zh": "Bernice 問：「每天都會這樣嗎？」"}, {"en": "\"Only on days when nobody has class there,\" the student said. \"Which made it feel strange.\"", "zh": "那個學生說：「只有在沒有人在那裡上課的日子才會這樣，這讓人覺得很奇怪。」"}, {"en": "The next afternoon, Coco and Bernice waited near the door of Room 306 at exactly four o'clock.", "zh": "隔天下午，Coco 和 Bernice 準時四點在306教室門口等著。"}, {"en": "At first, silence. Then, very quietly, they heard it: a slow, soft song, coming from somewhere inside.", "zh": "一開始是安靜的，接著，他們很小聲地聽到了：一首緩慢、輕柔的歌，從裡面某個地方傳出來。"}, {"en": "Bernice reached for the door handle right away.", "zh": "Bernice 立刻伸手去抓門把。"}, {"en": "Coco stopped her. \"Wait,\" she said. \"We don't know who's in there, or why.\"", "zh": "Coco 攔住她：「等一下，」她說：「我們不知道裡面是誰，也不知道為什麼。」"}, {"en": "\"After four cases,\" Coco said, \"I've learned one thing: knocking first matters more than opening fast.\"", "zh": "Coco 說：「查了四個案子之後，我學到一件事：先敲門比快點衝進去更重要。」"}, {"en": "So instead of opening the door, they knocked, gently, and waited.", "zh": "於是他們沒有直接開門，而是輕輕敲了門，然後等著。"}, {"en": "The music stopped right away. For a long moment, nobody answered.", "zh": "音樂立刻停了，有好長一段時間，沒有人回應。"}, {"en": "Then a quiet voice from inside said, \"...Just a minute.\"", "zh": "接著裡面傳來一個安靜的聲音說：「⋯⋯等一下。」"}, {"en": "Coco and Bernice looked at each other. Whatever was happening in Room 306, it clearly involved a real person, not a machine or an old story this time.", "zh": "Coco 和 Bernice 對看了一眼，不管306教室裡發生了什麼事，這次很明顯牽涉到一個真實的人，而不是機器或舊故事。"}, {"en": "When the door finally opened, they saw a girl about their age, holding a small guitar, her face red with surprise.", "zh": "門終於打開的時候，他們看到一個跟他們年紀差不多的女生，手裡拿著一把小吉他，臉因為驚訝而漲紅。"}, {"en": "\"Please don't tell anyone,\" she said quickly. \"I'm not supposed to be here.\"", "zh": "她很快地說：「拜託不要告訴別人，我不應該在這裡的。」"}, {"en": "Mei explained that music had always felt like her one true interest, ever since she was very young.", "zh": "Mei 解釋說，從她很小的時候開始，音樂一直是她真正的興趣。"}, {"en": "\"It's not about becoming famous,\" she said. \"I just love the feeling of getting a little better each week.\"", "zh": "她說：「不是為了出名，我只是喜歡每個星期都感覺自己進步一點點的那種感覺。」"}, {"en": "Once, Mei hurt her lip and had a sore throat right before the school music show, and everyone worried she couldn't sing.", "zh": "有一次 Mei 在音樂表演前受了唇傷又喉嚨痛，大家都擔心她沒辦法唱了。"}, {"en": "The school nurse checked her neck, her nose, and even her fingers, before finally saying it was nothing serious.", "zh": "校護檢查了她的脖子、鼻子，甚至手指，最後才說沒什麼大礙。"}, {"en": "\"Rest your body, drink warm water, and don't touch your throat,\" the nurse said, sounding a little tired herself.", "zh": "校護說：「讓身體休息，多喝溫水，別碰喉嚨。」她自己聽起來也有點累。"}, {"en": "Mei still performed that afternoon, standing tall on her own two feet, a little pale but proud.", "zh": "那天下午 Mei 還是上台表演了，雙腳站得直挺挺的，臉色有點蒼白但很驕傲。"}], "quiz": [{"question": "When does the sound in Room 306 happen?", "options": ["Around four o'clock, on days when nobody has class there", "Every morning at eight", "Only on weekends", "Only during exams"], "answer": 0}, {"question": "What do Coco and Bernice do instead of opening the door right away?", "options": ["They knock gently and wait", "They call the principal", "They break the lock", "They leave and never come back"], "answer": 0}, {"question": "What does \"handle\" mean here?", "options": ["把手", "計畫", "危險", "問題"], "answer": 0}, {"question": "Who do they find in Room 306?", "options": ["A girl playing guitar, who asks them not to tell anyone", "Mr. Pan practicing a speech", "A group of teachers", "Nobody at all"], "answer": 0}]}, {"level": 1, "chapter": 13, "title": "Not Really a Secret", "targetWords": [{"word": "family", "pos": "n.", "zh": "家庭", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "live", "pos": "v./adj.", "zh": "居住", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "lived", "pastParticipleForm": "lived"}, {"word": "small", "pos": "adj./n./adv.", "zh": "小的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "smalled", "pastParticipleForm": "smalled"}, {"word": "apartment", "pos": "n.", "zh": "公寓", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "parent(s)", "pos": "n.", "zh": "父母）", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "brother", "pos": "n.", "zh": "兄弟", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "all", "pos": "adj./adv./pron./n.", "zh": "全部", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "alled", "pastParticipleForm": "alled"}, {"word": "share", "pos": "v./n.", "zh": "分享", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "shared", "pastParticipleForm": "shared"}, {"word": "bedroom", "pos": "n.", "zh": "臥室", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "hope", "pos": "v./n.", "zh": "希望", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 1, "pastForm": "hoped", "pastParticipleForm": "hoped"}, {"word" ceIndex": 26}, {"word": "national", "pos": "adj.", "zh": "國家的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 27}, {"word": "news", "pos": "n.", "zh": "訊息", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 27}, {"word": "mention", "pos": "v./n.", "zh": "提到", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 27, "pastForm": "mentioned", "pastParticipleForm": "mentioned"}, {"word": "miss", "pos": "v./n.", "zh": "錯過", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 28, "pastForm": "missed", "pastParticipleForm": "missed"}, {"word": "noise", "pos": "n.", "zh": "噪音", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 28}, {"word": "busy", "pos": "adj.", "zh": "忙碌的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 28}, {"word": "street", "pos": "n.", "zh": "街道", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 28}, {"word": "record", "pos": "n./v.", "zh": "記錄", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 29, "pastForm": "recorded", "pastParticipleForm": "recorded"}], "extraHighlightWords": [{"word": "episode", "pos": "n.", "zh": "一集；事件", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 10, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "Mei's family lived in a small apartment with her parents and her younger brother, all sharing one bedroom.", "zh": "Mei 的家人住在一間小公寓裡，跟爸媽和弟弟一起，全家共用一間臥室。"}, {"en": "She hoped that if she practiced hard enough, her dream of joining a real music school might come true one day.", "zh": "她希望只要練習得夠努力，有一天加入正式音樂學校的夢想真的能實現。"}, {"en": "Mei sat back down, her guitar across her knees, and did not look at them for a moment.", "zh": "Mei 又坐了下來，吉他橫放在膝蓋上，有那麼一刻沒有看他們。"}, {"en": "\"It's not really a secret,\" she said finally. \"It's just... not official, either.\"", "zh": "她最後說：「這其實不算秘密，只是⋯⋯也不算正式。」"}, {"en": "She explained that she wanted to join the school's music show next month.", "zh": "她解釋說，她想參加下個月的學校音樂表演。"}, {"en": "\"The band room is always full,\" she said. \"And there's no space at home to practice.\"", "zh": "她說：「音樂教室永遠都是滿的，家裡也沒有空間可以練習。」"}, {"en": "A few weeks ago, she asked a teacher if she could use an empty classroom after school.", "zh": "幾星期前，她問了一位老師，能不能借用一間放學後空著的教室。"}, {"en": "\"The teacher said yes, if the room was empty,\" Mei said. \"But I don't think anyone else was told.\"", "zh": "Mei 說：「老師說可以，只要教室是空的，但我覺得沒有人告訴其他人這件事。」"}, {"en": "So every day, she checked if Room 306 was free, and quietly let herself in.", "zh": "所以她每天都會確認306教室有沒有空，然後悄悄地進去。"}, {"en": "\"I didn't want to ask again,\" she said. \"I was scared the answer might change.\"", "zh": "她說：「我不想再問一次，我怕答案會變。」"}, {"en": "Bernice's eyes lit up. \"This would make a great episode.\"", "zh": "Bernice 眼睛一亮：「這會是很棒的一集。」"}, {"en": "Coco gave her a look. \"We ask first,\" she said. \"Remember?\"", "zh": "Coco 看了她一眼：「我們要先問過，」她說：「記得嗎？」"}, {"en": "Bernice turned to Mei. \"Would you want your story on the show? Only if you say yes.\"", "zh": "Bernice 轉向 Mei：「你希望你的故事上節目嗎？只有你說好才算。」"}, {"en": "Mei thought about it for a long moment. \"Not my name,\" she said. \"But... maybe the idea.\"", "zh": "Mei 想了好一會兒：「不要說我的名字，」她說：「但⋯⋯也許可以講這個想法。」"}, {"en": "\"What idea?\" Coco asked.", "zh": "Coco 問：「什麼想法？」"}, {"en": "\"That students need real practice space,\" Mei said. \"Not just borrowed rooms that could disappear any day.\"", "zh": "Mei 說：「學生需要真正的練習空間，不是隨時可能消失的借來的房間。」"}, {"en": "That sentence stayed with Coco long after they left Room 306.", "zh": "這句話在他們離開306教室後，一直留在 Coco 心裡。"}, {"en": "That evening, she brought the whole story to Mr. Pan, careful to leave Mei's name out of it.", "zh": "那天晚上，她把整件事告訴潘老師，小心地沒有提到 Mei 的名字。"}, {"en": "Mr. Pan listened, then asked one simple question. \"What does she actually want us to do?\"", "zh": "潘老師聽完，問了一個簡單的問題：「她真正希望我們做什麼？」"}, {"en": "\"She wants the room to be official,\" Coco said. \"Not a secret anyone could take away.\"", "zh": "Coco 說：「她希望這個房間變成正式的，而不是隨時可能被拿走的秘密。」"}, {"en": "\"Then that's the episode,\" Mr. Pan said. \"Not about one girl. About a real problem worth fixing.\"", "zh": "潘老師說：「那就是這一集的重點，不是關於一個女生，而是關於一個值得解決的真正問題。」"}, {"en": "Coco wrote down the new plan, feeling, for the first time in this case, that they finally knew what to do.", "zh": "Coco 寫下新計畫，這是這個案子裡，她第一次覺得他們終於知道該怎麼做了。"}, {"en": "Mei's father worked as a driver, and her mother sewed clothes for a small shop near their apartment.", "zh": "Mei 的爸爸是司機，媽媽在他們公寓附近的一間小商店幫忙縫製衣服。"}, {"en": "Her little brother was still a baby, and the whole family often stayed up late just to keep him calm.", "zh": "她的弟弟還是個嬰兒，全家人常常熬夜就為了讓他保持安靜。"}, {"en": "Mei's music teacher once told her that talent alone was never enough without daily practice.", "zh": "Mei 的音樂老師曾告訴她，光有天分不夠，還是需要每天練習。"}, {"en": "\"I'm not the smartest player in my class,\" Mei admitted, \"but I'm probably the most stubborn one.\"", "zh": "Mei 坦承：「我不是班上彈得最好的人，但我大概是最固執的一個。」"}, {"en": "That week, Mei's family had a video call with a relative who had moved abroad years ago.", "zh": "那個星期，Mei 家跟一位多年前搬到國外的親戚視訊通話。"}, {"en": "Her relative said the national news abroad barely mentioned their small hometown at all.", "zh": "那位親戚說，國外的國家新聞幾乎完全沒提過他們的小家鄉。"}, {"en": "\"I still miss it,\" the relative said, \"even the noise, even the busy streets.\"", "zh": "親戚說：「我還是很想念，連那些吵鬧、連那些擁擠的街道都想念。」"}, {"en": "Mei's mother recorded the whole call, saying it was worth keeping for years to come.", "zh": "Mei 的媽媽把整通通話錄了下來，說這值得留存好幾年。"}], "quiz": [{"question": "Why has Mei been using Room 306?", "options": ["She has no other space to practice for the school music show", "She is hiding from a teacher", "She is fixing the room", "She lost her key and got locked in"], "answer": 0}, {"question": "What does Coco remind Bernice to do before using Mei's story?", "options": ["Ask Mei first, instead of assuming", "Tell the whole school immediately", "Ask Mr. Pan instead of Mei", "Record without asking"], "answer": 0}, {"question": "What does \"official\" mean?", "options": ["正式的", "秘密的", "危險的", "免費的"], "answer": 0}, {"question": "What does Mei actually want, in the end?", "options": ["For the practice room to become official, not a secret", "To stop playing guitar", "To be famous at school", "To switch schools"], "answer": 0}]}, {"level": 1, "chapter": 14, "title": "Five Cases, One Notebook", "targetWords": [{"word": "notebook", "pos": "n.", "zh": "筆記本", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 0}, {"word": "full", "pos": "adj.", "zh": "滿的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "small", "pos": "adj./n./adv.", "zh": "小的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "smalled", "pastParticipleForm": "smalled"}, {"word": "drawing", "pos": "n.", "zh": "繪畫", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 0}, {"word": "now", "pos": "adv./n.", "zh": "現在", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "nowed", "pastParticipleForm": "nowed"}, {"word": "blue", "pos": "adj./n.", "zh": "藍色的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "green", "pos": "adj./n./v.", "zh": "綠色的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "greened", "pastParticipleForm": "greened"}, {"word": "brown", "pos": "adj./v./n.", "zh": "棕色的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "browned", "pastParticipleForm": "browned"}, {"word": "ink", "pos": "n./v.", "zh": "墨水", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 0, "pastForm": "inked", "pastParticipleForm": "inked"}, {"word": "color", "pos": "n./v.", "zh": "顏色", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "colored", "pastParticipleForm": "colored"}, {"word": "each", "pos": "pron./adj./adv.", "zh": "每個", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "eached", "pastParticipleForm": "eached"}, {"word": "case", "pos": "n./v.", "zh": "案件", "phonetic": "", r for each case.", "zh": "Coco 的筆記本現在畫滿了小圖，用藍色、綠色、棕色的筆各代表一個案子。"}, {"en": "The new episode did not use anyone's name, not even a made-up one.", "zh": "新一集完全沒有用到任何名字，連假名都沒有。"}, {"en": "It simply asked one question: \"What happens to students who need space nobody officially gave them?\"", "zh": "它只問了一個問題：「那些需要空間、卻沒有人正式給他們空間的學生，會怎麼樣？」"}, {"en": "Coco described a student who practiced music every day in a room that was never truly hers.", "zh": "Coco 描述了一個每天在一間從來不是真正屬於她的房間裡練習音樂的學生。"}, {"en": "\"She didn't break any rule,\" Coco said. \"There just wasn't a rule for her in the first place.\"", "zh": "Coco 說：「她沒有違反任何規則，只是一開始根本沒有適合她的規則。」"}, {"en": "Bernice added her part. \"How many other students are quietly doing the same thing, somewhere in this school?\"", "zh": "Bernice 補充：「這間學校裡，還有多少學生正在某個角落，默默做著一樣的事？」"}, {"en": "When the episode played, three more students sent notes to the Friday Box, each with a different quiet space they used without asking.", "zh": "這一集播出後，又有三個學生寄了紙條到 Friday Box，每個人都提到自己用過、卻沒有問過的一個安靜角落。"}, {"en": "Mr. Pan brought all four notes to the school office together.", "zh": "潘老師把這四張紙條一起帶去學校辦公室。"}, {"en": "A week later, a new sign appeared outside Room 306: \"Practice Space. Please sign up on the list.\"", "zh": "一星期後，306教室外面出現一塊新告示：「練習空間，請在名單上簽名。」"}, {"en": "Mei's name was not on any list, on the show, or anywhere public. But she signed up first.", "zh": "Mei 的名字沒有出現在任何名單、節目，或任何公開的地方，但她是第一個報名的人。"}, {"en": "\"We didn't solve a mystery this time,\" Coco said to Bernice. \"We solved a problem.\"", "zh": "Coco 對 Bernice 說：「這次我們不是解開一個謎，我們是解決了一個問題。」"}, {"en": "\"Same podcast, different kind of case,\" Bernice said. \"I think I like this kind too.\"", "zh": "Bernice 說：「同一個 podcast，不同種類的案子，我發現我也喜歡這種。」"}, {"en": "Five cases in, and their notebook was now thick with names, dates, and small drawings of doors, clocks, and stairs.", "zh": "做到第五個案子，他們的筆記本已經厚厚一疊，寫滿了名字、日期，還有門、鐘、樓梯的小塗鴉。"}, {"en": "Coco looked back through the pages one evening, reading her own old notes like they belonged to someone else.", "zh": "有天晚上，Coco 翻回前面的頁面，讀著自己以前寫的筆記，感覺好像是別人寫的一樣。"}, {"en": "Clock. Light. Drink. Stairs. Room. Five very different cases, she thought, but not five different lessons.", "zh": "鐘、燈、飲料、樓梯、房間，她想，五個非常不同的案子，卻不是五種不同的教訓。"}, {"en": "Every single time, the real answer was hiding behind the first question they thought to ask.", "zh": "每一次，真正的答案都藏在他們一開始想問的那個問題背後。"}, {"en": "She was still thinking about this when a new note arrived in the Friday Box the next morning.", "zh": "她還在想這件事的時候，隔天早上，Friday Box 裡又出現了一張新紙條。"}, {"en": "This one was different: not a question about something strange, but a small drawing of a locker with a number on it.", "zh": "這張不一樣：不是問一件奇怪的事，而是畫了一個置物櫃，上面有一個號碼。"}, {"en": "Under the drawing, someone had written just one line: \"Locker 113 always has something inside for whoever needs it.\"", "zh": "圖畫下面，有人只寫了一行字：「113號置物櫃裡，總是有東西留給需要的人。」"}, {"en": "Bernice read it over Coco's shoulder and smiled.", "zh": "Bernice 從 Coco 肩膀後面看到這句話，笑了。"}, {"en": "\"Case six,\" she said. \"Let's go find out who's behind locker 113.\"", "zh": "她說：「案件六，我們去查查看113號置物櫃背後是誰。」"}, {"en": "On Saturday, Coco's family went to the bank, then to the supermarket, then to a small restaurant near the train station for lunch.", "zh": "星期六，Coco 一家人先去了銀行，再去超市，最後在火車站附近一間小餐廳吃午餐。"}, {"en": "Her mother wore a comfortable brown coat and a bright pink scarf, even though the weather wasn't that cold.", "zh": "媽媽穿了一件舒服的棕色外套和一條亮粉色圍巾，雖然天氣沒那麼冷。"}, {"en": "At the restaurant, Coco ordered fried chicken with tomato sauce, while her brother chose a bowl of noodles with extra meat.", "zh": "在餐廳裡，Coco 點了番茄醬炸雞，弟弟則選了一碗加了很多肉的麵。"}, {"en": "Afterward, they walked past a small church, a quiet temple, and a busy movie theater on their way home.", "zh": "之後，他們走過一間小教堂、一座安靜的寺廟，還有一間熱鬧的電影院，才回到家。"}, {"en": "Bernice spent her weekend differently: she helped her uncle clean his shop and organize boxes in the back room.", "zh": "Bernice 的週末過得不一樣：她幫叔叔打掃店裡，整理後面房間的箱子。"}, {"en": "\"It's boring work,\" she told Coco later, \"but it's honest work, and I get a little money for it.\"", "zh": "她後來告訴 Coco：「這工作很無聊，但很誠實，而且我還能賺一點錢。」"}, {"en": "Mr. Pan spent his Sunday fixing a broken pipe under his kitchen sink, which he said was harder than solving any case.", "zh": "潘老師星期天忙著修理廚房水槽下面一根壞掉的水管，他說這比破解任何案子都難。"}, {"en": "Ms. Ho, meanwhile, visited an old friend at the hospital and brought a small basket of fruit and flowers.", "zh": "何老師則是去醫院看一位老朋友，帶了一小籃水果和花。"}, {"en": "Down the street, a young lawyer moved into a new office, and a doctor opened a small clinic next to the pharmacy.", "zh": "街尾，一位年輕律師搬進新的辦公室，一位醫生也在藥局旁邊開了一間小診所。"}, {"en": "The city felt different depending on which street you walked down: noisy near the market, quiet near the pond by the park.", "zh": "同一座城市，走不同的街道感覺完全不同：靠近市場很吵，靠近公園池塘的地方卻很安靜。"}, {"en": "Some students spent the weekend at the beach, others at a picnic by the river, and a few simply stayed home and did homework.", "zh": "有些學生週末去了海邊，有些去河邊野餐，還有些人就只是待在家裡寫作業。"}, {"en": "One classmate's father was an engineer who built bridges; another's mother was a writer who wrote for a small local newspaper.", "zh": "一個同學的爸爸是造橋的工程師，另一個同學的媽媽是為當地小報寫稿的作家。"}, {"en": "A teenager from another school once got lost near their neighborhood, and Bernice walked him all the way to the bus stop.", "zh": "有一次，隔壁學校的一個青少年在他們附近迷路了，Bernice 一路陪他走到公車站。"}, {"en": "It felt like a small thing, she said, but it was the kind of small thing worth doing anyway.", "zh": "她說，這感覺是件小事，但這種小事還是值得做。"}, {"en": "One rainy lunch, they made up a silly game: describe each classmate in exactly one word.", "zh": "有個下雨的午餐時間，他們玩了一個無聊的遊戲：用一個字形容每個同學。"}, {"en": "Bernice called herself \"cute but stupid sometimes,\" which made everyone laugh.", "zh": "Bernice 說自己「可愛但有時候很笨」，逗得大家都笑了。"}, {"en": "Coco was called \"smart, a little sad-looking, but actually pretty funny once you know her.\"", "zh": "大家形容 Coco 是「聰明、看起來有點憂鬱，但熟了以後其實很搞笑」。"}, {"en": "Mr. Pan, when asked, said he was probably \"too proud to admit he's modern, and too modern to admit he's proud.\"", "zh": "問到潘老師的時候，他說自己大概是「太驕傲不肯承認自己很現代，又太現代不肯承認自己很驕傲」。"}, {"en": "Wei described himself as simply \"cheap, careful, and married to one drink for life.\"", "zh": "Wei 形容自己是「省錢、小心，而且一輩子只忠於一款飲料」。"}, {"en": "Someone called the guard \"quiet, common-sense, married, and secretly the funniest man in school.\"", "zh": "有人形容警衛「安靜、有常識、已婚，而且其實是全校最好笑的人」。"}, {"en": "\"This is a stupid game,\" Bernice said happily, \"but it's actually pretty interesting.\"", "zh": "Bernice 開心地說：「這遊戲很蠢，但其實還滿有意思的。」"}, {"en": "Every spring, the school held a club fair in the main hall, where each group tried to attract new members.", "zh": "每年春天，學校都會在大禮堂辦社團博覽會，每個社團都想吸引新成員。"}, {"en": "One booth offered a free cent-sized sticker to anyone who signed up, which Bernice thought was a clever trick.", "zh": "有一個攤位只要報名就送一張小小的貼紙，Bernice 覺得這招很聰明。"}, {"en": "A boy at the chess club table asked Coco if quiet hobbies interested her more than loud ones.", "zh": "西洋棋社攤位的一個男生問 Coco，安靜的嗜好是不是比熱鬧的更吸引她。"}, {"en": "\"Honestly,\" she said, \"I think my real hobby is just asking too many questions.\"", "zh": "她說：「老實說，我覺得我真正的嗜好就是問太多問題。」"}, {"en": "Bernice signed up for three different clubs at once, then quietly dropped two of them a week later.", "zh": "Bernice 一次報名了三個社團，一星期後又悄悄退出了兩個。"}], "quiz": [{"question": "What does the new episode focus on, without using any names?", "options": ["Students who need space nobody officially gave them", "The history of the school building", "A list of school rules", "A new podcast microphone"], "answer": 0}, {"question": "What happens outside Room 306 after the episode airs?", "options": ["A new sign appears making it an official practice space", "The room is closed forever", "The room is turned into storage", "Nothing changes at all"], "answer": 0}, {"question": "What does \"lesson\" mean?", "options": ["教訓；課程", "危險", "秘密", "問題"], "answer": 0}, {"question": "What new mystery appears at the end of the chapter?", "options": ["A note about Lo r: a folded paper crane and a piece of chocolate.", "zh": "曾經有人在置物櫃裡留下一份小禮物：一隻摺紙鶴，還有一小塊巧克力。"}, {"en": "Nobody signed their name, but the handwriting always looked honest and careful.", "zh": "沒有人簽名，但字跡看起來總是誠懇又用心。"}, {"en": "Locker 113 was old, near the end of the hallway, with a mark on the door and a lock that never quite closed all the way.", "zh": "113號置物櫃很舊，在走廊盡頭附近，門上有個痕跡，鎖也從來沒辦法完全關緊。"}, {"en": "According to the school list, it belonged to nobody. No name, no class, just an empty line.", "zh": "根據學校的名單，它不屬於任何人，沒有名字，沒有班級，只有一行空白。"}, {"en": "\"An empty locker with a broken lock,\" Bernice said. \"That's an easy case.\"", "zh": "Bernice 說：「一個沒人用又鎖不緊的置物櫃，這案子很簡單。」"}, {"en": "Coco opened it carefully. Inside was a single folded piece of paper and a small piece of chocolate.", "zh": "Coco 小心地打開它，裡面有一張折起來的紙，還有一小片巧克力。"}, {"en": "The paper said: \"You're doing better than you think.\"", "zh": "紙上寫著：「你比自己想的做得更好。」"}, {"en": "\"That's for whoever opens it next,\" Coco said quietly.", "zh": "Coco 小聲說：「這是留給下一個打開它的人的。」"}, {"en": "They asked a few students walking by if they knew about the locker.", "zh": "他們問了幾個經過的學生知不知道這個置物櫃的事。"}, {"en": "\"Everyone knows about 113,\" one student said. \"You open it on a hard day. There's always something inside.\"", "zh": "一個學生說：「大家都知道113號，你在難過的日子打開它，裡面總是有東西。」"}, {"en": "\"Who puts the things inside?\" Bernice asked.", "zh": "Bernice 問：「是誰把東西放進去的？」"}, {"en": "The student didn't seem to know either. \"I don't know,\" she said. \"I put something in myself, once.\"", "zh": "那個學生也不太清楚：「我不知道，」她說：「我自己也放過一次東西進去。」"}, {"en": "Coco and Bernice looked at each other. This was not like the other cases.", "zh": "Coco 和 Bernice 對看了一眼，這跟其他案子不一樣。"}, {"en": "\"In every case before this,\" Coco said, \"there was one person behind it. One reason, one answer.\"", "zh": "Coco 說：「在這之前的每個案子，背後都有一個人，一個原因，一個答案。」"}, {"en": "\"Maybe this time there isn't just one,\" Bernice said slowly.", "zh": "Bernice 慢慢地說：「也許這次不是只有一個人。」"}, {"en": "They decided to watch the locker for a few days, the same way they had watched the clock, months ago.", "zh": "他們決定觀察這個置物櫃幾天，就像幾個月前觀察那個鐘一樣。"}, {"en": "On the first day, a boy they didn't know walked past, opened it, read the note inside, and put in a small card before closing it again.", "zh": "第一天，一個他們不認識的男生走過去，打開櫃子，讀了裡面的紙條，放進一張小卡片，然後把櫃子關上。"}, {"en": "On the second day, a girl added a pencil. On the third day, someone left a short poem.", "zh": "第二天，一個女生放進一支鉛筆，第三天，有人留了一首短詩。"}, {"en": "Nobody who added something took anything out. Nobody who took something seemed to know who had left it.", "zh": "放東西進去的人都沒有拿走任何東西，拿走東西的人似乎也不知道是誰放的。"}, {"en": "\"It's not one person,\" Coco said finally. \"It's whoever needs it, and then whoever has something to give.\"", "zh": "Coco 最後說：「這不是一個人，是需要的人，然後是有東西可以給的人。」"}, {"en": "Bernice sat down slowly on the floor near the locker. \"How do you solve a case,\" she asked, \"that isn't really a secret at all?\"", "zh": "Bernice 慢慢地坐到置物櫃旁邊的地上：「一個根本不算秘密的案子，」她問：「要怎麼解開？」"}, {"en": "Coco didn't have an answer yet, but for the first time, she wasn't sure they needed one.", "zh": "Coco 還沒有答案，但這是第一次，她不確定他們真的需要一個答案。"}, {"en": "One rainy week, the locker held a small folded umbrella instead of a note.", "zh": "有一個下雨的星期，置物櫃裡放的不是紙條，而是一把折疊小雨傘。"}, {"en": "Another time, it was a single orange, with a smiley face drawn on the peel.", "zh": "還有一次，裡面是一顆柳橙，皮上畫著一張笑臉。"}, {"en": "That weekend, Coco's family made a shopping list: butter, salt, a new dictionary for her brother, and a belt for her father.", "zh": "那個週末，Coco 家寫了一張採買清單：奶油、鹽、給弟弟的一本新字典，還有給爸爸的一條皮帶。"}, {"en": "At the store, her mother also picked up a fork set, a small towel, and a pair of jeans on sale.", "zh": "在店裡，媽媽還買了一組叉子、一條小毛巾，還有一件特價的牛仔褲。"}, {"en": "Coco added a T-shirt, a tie for a school event, and a cheap plastic tool kit her brother had been asking for.", "zh": "Coco 加買了一件 T 恤、一條要用在學校活動的領帶，還有弟弟一直吵著要的便宜塑膠工具組。"}], "quiz": [{"question": "What is unusual about Locker 113?", "options": ["It belongs to nobody on the school list, but always has something kind inside", "It is always empty", "It is locked with a special key", "It belongs to a teacher"], "answer": 0}, {"question": "What do Coco and Bernice discover after watching the locker for a few days?", "options": ["Many different students add things, not just one person", "Nobody ever touches the locker", "The same boy visits every day", "The locker is broken and cannot open"], "answer": 0}, {"question": "What does \"official\" not apply to in this case, unlike Room 306?", "options": ["Locker 113 has no single person or plan behind it", "The locker has an official form", "The school locked it officially", "Nothing about this case is different"], "answer": 0}, {"question": "How does Coco feel about not having a clear answer this time?", "options": ["She isn't sure they need one", "She feels angry", "She wants to give up the podcast", "She reports it to Mr. Pan immediately"], "answer": 0}]}, {"level": 1, "chapter": 16, "title": "Kindness Without an Owner", "targetWords": [{"word": "drawing", "pos": "n.", "zh": "繪畫", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 0}, {"word": "found", "pos": "v.", "zh": "成立", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 0, "pastForm": "founded", "pastParticipleForm": "founded"}, {"word": "return", "pos": "v./n.", "zh": "返回", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 0, "pastForm": "returned", "pastParticipleForm": "returned"}, {"word": "show", "pos": "v./n.", "zh": "展示", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "showed", "pastParticipleForm": "showed"}, {"word": "bright", "pos": "adj./adv.", "zh": "明亮的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "brighted", "pastParticipleForm": "brighted"}, {"word": "yellow", "pos": "adj./n./v.", "zh": "黃色的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "yellowed", "pastParticipleForm": "yellowed"}, {"word": "sun", "pos": "n./v.", "zh": "太陽 currenceSentenceIndex": 33, "pastForm": "whiled", "pastParticipleForm": "whiled"}, {"word": "twice", "pos": "adv.", "zh": "兩次", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 33, "pastForm": "twiced", "pastParticipleForm": "twiced"}], "extraHighlightWords": [{"word": "podcast", "pos": "n.", "zh": "Podcast；網路廣播節目", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 6, "highlightType": "extra-high-frequency"}, {"word": "locker", "pos": "n.", "zh": "置物櫃", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 9, "highlightType": "extra-high-frequency"}, {"word": "episode", "pos": "n.", "zh": "一集；事件", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 15, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "The drawing Coco found in return showed a bright yellow sun with a wide, happy smile.", "zh": "Coco 後來收到的那張圖畫，畫的是一個明亮的黃色太陽，帶著大大的笑臉。"}, {"en": "It filled her with a small, wonderful kind of joy she hadn't expected.", "zh": "這讓她心裡湧起一種她沒想到會有的、美好的喜悅。"}, {"en": "That evening, Coco brought the case to Mr. Pan, unsure how to even describe it.", "zh": "那天晚上，Coco 把這個案子告訴潘老師，不太確定該怎麼形容它。"}, {"en": "\"There's no one to interview,\" she said. \"No name, no reason, no ending.\"", "zh": "她說：「沒有人可以訪問，沒有名字，沒有原因，也沒有結局。」"}, {"en": "Mr. Pan listened, then smiled in a way Coco hadn't seen before.", "zh": "潘老師聽著，然後露出 Coco 之前沒見過的笑容。"}, {"en": "\"Maybe that's the case,\" he said. \"Not everything needs a name attached to be real.\"", "zh": "他說：「也許這就是案子本身，不是每件事都需要一個名字才算真的。」"}, {"en": "Bernice thought about that for a moment. \"But a podcast needs something to say.\"", "zh": "Bernice 想了一下：「但 podcast 得說點什麼吧。」"}, {"en": "\"Then say that,\" Mr. Pan said. \"Say that kindness doesn't always have an owner.\"", "zh": "潘老師說：「那就說這個，說善意不一定有一個主人。」"}, {"en": "Coco wrote the sentence down right away, before she could forget the exact words.", "zh": "Coco 馬上把這句話寫下來，怕自己忘記確切的用字。"}, {"en": "That night, before going home, Coco stopped by Locker 113 one more time.", "zh": "那天晚上，回家前，Coco 又順路去了一趟113號置物櫃。"}, {"en": "She had brought something small from her own bag: a short note with three words on it.", "zh": "她從自己的書包裡帶了一樣小東西：一張只有三個字的短紙條。"}, {"en": "She didn't tell Bernice what she wrote. She just placed it inside and closed the door.", "zh": "她沒有告訴 Bernice 她寫了什麼，她只是把紙條放進去，關上門。"}, {"en": "The next morning, the note was gone, and something new sat in its place: a small drawing of a smiling sun.", "zh": "隔天早上，那張紙條不見了，取而代之的是一樣新東西：一張畫著笑臉太陽的小圖畫。"}, {"en": "Coco realized she would probably never know who took her note, or who left the drawing.", "zh": "Coco 意識到她大概永遠不會知道是誰拿走了她的紙條，或是誰留下了那張圖畫。"}, {"en": "For once, that felt completely fine.", "zh": "這一次，這樣的感覺完全沒問題。"}, {"en": "The episode about Locker 113 was short, only a few minutes long.", "zh": "關於113號置物櫃的這一集很短，只有幾分鐘。"}, {"en": "It ended with one line from Coco: \"We didn't find who started this. We're not sure anyone remembers anymore. But it's still going.\"", "zh": "結尾是 Coco 說的一句話：「我們沒找到是誰開始的，也許連他們自己都不記得了，但它現在還在繼續。」"}, {"en": "After the episode aired, three more lockers around the school quietly started the same habit.", "zh": "這一集播出後，學校裡又有三個置物櫃悄悄開始了一樣的習慣。"}, {"en": "Bernice kept a private list of which lockers, just for herself, and never told anyone the number.", "zh": "Bernice 自己私下記了一份清單，寫下是哪幾個置物櫃，但沒有告訴任何人號碼。"}, {"en": "\"Some things,\" she told Coco, \"work better if nobody's counting too closely.\"", "zh": "她告訴 Coco：「有些事情，如果沒有人盯得太緊，反而做得更好。」"}, {"en": "Case six ended without a single name, and somehow, it was one of their favorite episodes yet.", "zh": "案件六在沒有出現任何一個名字的情況下結束了，不知怎麼地，這卻成了他們目前最喜歡的一集。"}, {"en": "That weekend, a new note appeared in the Friday Box — but this one made both of them laugh before they even finished reading it.", "zh": "那個週末，Friday Box 裡出現了一張新紙條——但這張紙條他們還沒讀完就已經笑了出來。"}, {"en": "It read: \"The guard's dog barks at exactly 3:33 every afternoon, at nothing. Please investigate. This is very important.\"", "zh": "上面寫著：「警衛的狗每天下午三點三十三分準時對著空氣狂吠，請調查，這件事非常重要。」"}, {"en": "\"Finally,\" Bernice said, \"a case that isn't going to make me cry.\"", "zh": "Bernice 說：「終於，一個不會讓我哭的案子。」"}, {"en": "That same week, the school held its yearly sports day, with a baseball game in the morning and a basketball match after lunch.", "zh": "同一個星期，學校辦了年度運動會，早上是棒球比賽，午餐後是籃球比賽。"}, {"en": "Every student had to wear the school uniform, though some added a T-shirt underneath for extra warmth.", "zh": "每個學生都得穿學校制服，不過有些人裡面多加了一件 T 恤保暖。"}, {"en": "Bernice, who wore shorts and old sneakers, said tennis was more fun than any team sport.", "zh": "Bernice 穿著短褲和舊球鞋，說網球比任何團體運動都好玩。"}, {"en": "Coco preferred to sit and watch, holding a cool drink and cheering for her team from a safe distance.", "zh": "Coco 比較喜歡坐著看，手裡拿著一杯冰涼的飲料，在安全距離外幫自己的隊伍加油。"}, {"en": "After the games, the school store sold small prizes: a kite, a drum-shaped keychain, a tiny robot toy, and a box of colored paint.", "zh": "比賽結束後，學校商店賣起小獎品：一個風箏、鼓形鑰匙圈、一個小機器人玩具，還有一盒彩色顏料。"}, {"en": "Mei won a ticket for a free lemon pie at the food stand, and she shared it with Coco and Bernice.", "zh": "Mei 贏得一張免費檸檬派的兌換券，她跟 Coco 和 Bernice 一起分享。"}, {"en": "The stand also sold sweet potato snacks, salad in small cups, and honey tea in paper bottles.", "zh": "攤位還賣了地瓜點心、小杯沙拉，還有裝在紙瓶裡的蜂蜜茶。"}, {"en": "A local shop offered a small prize to anyone who could throw a ball through a paper ring from ten steps away.", "zh": "有一間當地商店提供小獎品，只要能從十步外把球丟過一個紙圈，就能得獎。"}, {"en": "In PE class, they had to complete a small obstacle course: bow under a rope, catch a ball, and cover a short distance without stopping.", "zh": "體育課裡，他們得完成一個小小的障礙賽：低頭鑽過繩子、接住一顆球，還要不停下來跑過一小段距離。"}, {"en": "Bernice managed the whole course in under a minute, while Coco stopped twice to fix her shoe.", "zh": "Bernice 不到一分鐘就完成整個障礙賽，Coco 卻停了兩次綁鞋帶。"}, {"en": "\"I'd rather lose slowly than fall and hurt myself,\" Coco said, only half joking.", "zh": "Coco 半開玩笑地說：「我寧願慢慢輸，也不要跌倒受傷。」"}, {"en": "Bernice's room, everyone agreed, was famously messy: a couch buried under clothes, a lamp with no bulb, and a drawer she refused to open.", "zh": "大家都公認 Bernice 的房間很出名地亂：沙發被衣服埋住，一盞沒燈泡的檯燈，還有一個她死都不肯打開的抽屜。"}, {"en": "\"It's not dirty,\" she insisted, \"it's just... a system nobody else understands.\"", "zh": "她堅持說：「這不算髒，只是⋯⋯一套別人看不懂的整理方式。」"}], "quiz": [{"question": "What does Mr. Pan say about the Locker 113 case?", "options": ["Not everything needs a name attached to be real", "It should be reported to the police", "It is not worth an episode", "It must be a teacher's project"], "answer": 0}, {"question": "What does Coco do at Locker 113 near the end of the chapter?", "options": ["She adds her own small note without telling Bernice what it says", "She takes the lock off", "She asks the principal to close it", "She puts a camera inside"], "answer": 0}, {"question": "What does \"owner\" mean in \"kindness doesn't always have an owner\"?", "options": ["擁有者", "陌生人", "秘密", "危險"], "answer": 0}, {"question": "What new note arrives at the end of the chapter?", "options": ["About a dog barking at 3:33 every afternoon for no reason", "About a missing locker key", "About a broken window", "About a new student"], "answer": 0}]}, {"level": 1, "chapter": 17, "title": "3:33, Every Afternoon", "targetWords": [{"word": "brown", "pos": "adj./v./n.", "zh": "棕色的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "browned", "pastParticipleForm": "browned"}, {"word": "medium", "pos": "adj.", "zh": "中等的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "size", "pos": "n./v.", "zh": "尺寸", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "sized", "pastParticipleForm": "sized"}, {"word": "dog", "pos": "n.", "zh": "狗", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "whole", "pos": "adj./n.", "zh": "所有的", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 0}, {"word": "day", "pos": "n.", "zh": "天", "phonetic": "", "level": 1, "firstOccurrenceSentenceI entenceIndex": 21}], "extraHighlightWords": [{"word": "mystery", "pos": "n.", "zh": "謎團；懸疑的事", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 15, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "Momo was a brown, medium-sized dog who normally spent her whole day sleeping quietly by the gate.", "zh": "Momo 是一隻棕色的中型狗，平常一整天都安靜地在校門口睡覺。"}, {"en": "Every other animal near the school, from birds to the neighborhood cats, seemed to ignore the same smell completely.", "zh": "學校附近的其他動物，從鳥到附近的貓，似乎都完全沒注意到同樣的味道。"}, {"en": "The guard's dog was named Momo, and everyone at school agreed she was the calmest dog they had ever met.", "zh": "警衛的狗叫 Momo，全校都同意牠是他們見過最溫和的狗。"}, {"en": "Except, apparently, at exactly 3:33 every afternoon.", "zh": "除了每天下午三點三十三分那一刻，顯然不是這樣。"}, {"en": "\"She just starts barking,\" the guard said. \"At nothing. Same time, every single day.\"", "zh": "警衛說：「她就是開始叫，對著空氣叫，每天都一樣的時間。」"}, {"en": "Bernice checked her watch. \"It's 3:20. Thirteen minutes until show time.\"", "zh": "Bernice 看了看手錶：「現在三點二十分，還有十三分鐘就要開演了。」"}, {"en": "At 3:33 exactly, Momo stood up, faced the school gate, and barked five times, loudly.", "zh": "三點三十三分整，Momo 站起來，面向校門，大聲叫了五聲。"}, {"en": "Then she sat back down, completely calm again, as if nothing had happened.", "zh": "接著她又坐回去，恢復完全平靜，好像什麼事都沒發生過一樣。"}, {"en": "\"She's not scared,\" Coco said, watching closely. \"She looks... excited.\"", "zh": "Coco 仔細觀察後說：「她不是害怕，她看起來⋯⋯是興奮。」"}, {"en": "They followed Momo's eyes and found she was always looking in the exact same direction: past the gate, toward the street.", "zh": "他們順著 Momo 的視線看過去，發現她每次都看著同一個方向：越過校門，朝著街道那邊。"}, {"en": "\"There's nothing unusual out there,\" Bernice said. \"Just the street. And that bakery on the corner.\"", "zh": "Bernice 說：「外面沒什麼特別的，就是街道，還有轉角那間麵包店。」"}, {"en": "Coco went quiet for a second. \"Wait. What time does that bakery start baking bread?\"", "zh": "Coco 突然安靜了一下：「等等，那間麵包店幾點開始烤麵包？」"}, {"en": "Neither of them knew, but both of them suddenly had the exact same idea at the exact same moment.", "zh": "他們兩個都不知道，但兩個人在同一時間突然有了一模一樣的想法。"}, {"en": "\"Tomorrow,\" Bernice said, \"we bring snacks. And we ask someone at the bakery some questions.\"", "zh": "Bernice 說：「明天我們帶點零食去，順便問麵包店的人幾個問題。」"}, {"en": "Mr. Pan, hearing the plan, only had one comment. \"A case that ends at a bakery,\" he said. \"I like this one already.\"", "zh": "潘老師聽到這個計畫，只說了一句話：「一個結束在麵包店的案子，」他說：「我已經很喜歡這一個了。」"}, {"en": "That night, Coco added a new question to her notebook: was it possible for a mystery to solve itself, just by someone finally checking the time?", "zh": "那天晚上，Coco 在筆記本上加了一個新問題：一個謎團有沒有可能，只要有人終於去查一下時間，就自己解開了？"}, {"en": "She wasn't sure yet, but she had a feeling this case would answer that question faster than any before it.", "zh": "她還不確定，但她有種感覺，這個案子解開的速度會比之前任何一個都快。"}, {"en": "Bernice, meanwhile, was already making a list of things to buy at the bakery, \"just to make sure they understood the case.\"", "zh": "與此同時，Bernice 已經在列一張要在麵包店買的東西清單，「只是為了把案子搞清楚。」"}, {"en": "\"That's not how investigating works,\" Coco said.", "zh": "Coco 說：「查案不是這樣查的。」"}, {"en": "\"It is now,\" Bernice said, and closed her notebook with a happy smile.", "zh": "Bernice 說：「現在是了。」然後闔上筆記本，臉上帶著開心的笑容。"}, {"en": "\"Dogs are smarter than people think,\" the guard said proudly. \"Momo even knows which days are holidays.\"", "zh": "警衛驕傲地說：「狗比大家想的還聰明，Momo 甚至知道哪天是假日。」"}, {"en": "\"I chose to become a school guard because I like quiet mornings,\" the guard admitted, scratching Momo behind the ear.", "zh": "警衛一邊搔著 Momo 的耳朵，一邊坦承：「我選擇當校警,是因為我喜歡安靜的早晨。」"}], "quiz": [{"question": "What is strange about Momo the dog?", "options": ["She barks at exactly 3:33 every afternoon, at nothing", "She never barks at all", "She only barks at teachers", "She barks all day long"], "answer": 0}, {"question": "What direction does Momo always look when she barks?", "options": ["Past the gate, toward the street and the bakery", "Up at the sky", "Toward the library", "Toward the vending machine"], to care about one smell.", "zh": "那間麵包店也賣新鮮餅乾、甜蛋糕，還有溫熱的奶油麵包，不過 Momo 好像只在乎一種味道。"}, {"en": "The next afternoon, they visited the bakery on the corner, right before 3:33.", "zh": "隔天下午，他們在三點三十三分之前去了轉角那間麵包店。"}, {"en": "The smell hit them before they even opened the door: warm bread, fresh and sweet.", "zh": "他們還沒開門，那股味道就先撲鼻而來：溫熱的麵包，新鮮又香甜。"}, {"en": "\"Every day at this time,\" the woman working there said, \"we finish baking the bread.\"", "zh": "「每天這個時間，」在裡面工作的女士說：「我們剛好烤好麵包。」"}, {"en": "\"And the smell goes... where, exactly?\" Coco asked.", "zh": "Coco 問：「那味道會飄去⋯⋯哪裡呢？」"}, {"en": "The woman smiled. \"Right out that window, and straight down the street, if the wind is right.\"", "zh": "女士笑了：「就從那扇窗戶飄出去，如果風向對的話，會一路飄到街上。」"}, {"en": "Bernice looked at Coco. \"Momo doesn't hear anything at 3:33,\" she said. \"She smells something.\"", "zh": "Bernice 看著 Coco：「Momo 三點三十三分不是聽到什麼，」她說：「她是聞到了什麼。」"}, {"en": "They walked back to school just in time to watch Momo stand, face the gate, and bark, right on schedule.", "zh": "他們走回學校，剛好趕上看 Momo 站起來，面向校門，準時開叫。"}, {"en": "\"It's not a mystery,\" Coco said, laughing. \"It's just a very good sense of smell.\"", "zh": "Coco 笑著說：「這根本不是謎團，只是嗅覺特別靈敏而已。」"}, {"en": "The guard admitted he had never once thought to check what was across the street.", "zh": "警衛承認他從來沒想過要去看看街對面有什麼。"}, {"en": "\"Fourteen years working here,\" he said, \"and I never noticed the bakery finished baking at exactly the same time every day.\"", "zh": "他說：「我在這裡工作十四年了，卻從來沒注意到那間麵包店每天都在一樣的時間烤好麵包。」"}, {"en": "The new episode was short and mostly funny, ending with Bernice eating a piece of bread on air.", "zh": "這一集又短又好笑，結尾是 Bernice 在錄音時邊講邊吃著一片麵包。"}, {"en": "\"Some cases,\" she said, mouth full, \"really do end at a bakery.\"", "zh": "她嘴裡塞滿食物說：「有些案子，真的會在麵包店結束。」"}, {"en": "That night, Coco looked at their growing list of cases and noticed something for the first time.", "zh": "那天晚上，Coco 看著他們越來越長的案件清單，第一次注意到一件事。"}, {"en": "Six cases. Six very different answers. But the Friday Box itself had never once been part of the story.", "zh": "六個案子，六種非常不同的答案，但 Friday Box 這個箱子本身，卻從來沒有真正成為故事的一部分。"}, {"en": "\"Who even started the Friday Box?\" she asked Bernice suddenly. \"Was it always Mr. Pan's idea?\"", "zh": "她突然問 Bernice：「Friday Box 到底是誰開始的？一直都是潘老師的主意嗎？」"}, {"en": "Bernice thought about it. \"I actually don't know,\" she said. \"We never asked.\"", "zh": "Bernice 想了想：「我其實不知道，」她說：「我們從來沒問過。」"}, {"en": "For the first time since they started the podcast, they realized there was one case they had never opened: their own.", "zh": "從他們開始做這個 podcast 以來，他們第一次意識到有一個案子，他們自己從來沒有打開過：就是他們自己的。"}, {"en": "The bakery owner said running a small business meant waking up before sunrise almost every single day.", "zh": "麵包店老闆說，經營一間小生意代表幾乎每天都得在日出前起床。"}], "quiz": [{"question": "Why does Momo bark at 3:33 every afternoon?", "options": ["She smells fresh bread from the bakery down the street", "She hears a bell", "She sees another dog", "She is hungry"], "answer": 0}, {"question": "How does the guard react when he learns the truth?", "options": ["He admits he never noticed the bakery's schedule", "He does not believe it", "He gets angry at the bakery", "He decides to move Momo"], "answer": 0}, {"question": "What does \"sense\" mean in \"a very good sense of smell\"?", "options": ["感官；知覺", "危險", "習慣", "問題"], "answer": 0}, {"question": "What new question does Coco ask at the end of the chapter?", "options": ["Who started the Friday Box in the first place?", "Who ate the last piece of bread?", "Why is the dog's name Momo?", "When is the next school holiday?"], "answer": 0}]}, {"level": 1, "chapter": 19, "title": "The Ten Minute Club", "targetWords": [{"word": "old", "pos": "adj.", "zh": "老的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "club", "pos": "n./v.", "zh": "俱樂部", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "clubed", "pastParticipleForm": "clubed"}, {"word": "file", "pos": "n./v.", "zh": "文件", "phonetic": "", "le stParticipleForm": "probablyed"}, {"word": "exist", "pos": "v.", "zh": "存在", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 23, "pastForm": "existed", "pastParticipleForm": "existed"}, {"word": "entire", "pos": "adj.", "zh": "全部的", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 23}, {"word": "building", "pos": "n.", "zh": "大樓", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 23}], "extraHighlightWords": [{"word": "podcast", "pos": "n.", "zh": "Podcast；網路廣播節目", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 10, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "The old club file had a faded photograph clipped to the front page, showing a small group of students by the school gate.", "zh": "那份舊社團資料的第一頁夾著一張褪色的照片，拍的是一小群學生站在校門口。"}, {"en": "The next morning, Coco asked Mr. Pan directly. \"Who started the Friday Box? Was it your idea?\"", "zh": "隔天早上，Coco 直接問潘老師：「Friday Box 是誰開始的？是你的主意嗎？」"}, {"en": "Mr. Pan looked up from his desk, and for a second, said nothing at all.", "zh": "潘老師從桌子那邊抬起頭來，有那麼一秒鐘，什麼都沒說。"}, {"en": "\"That's not really what the show is about,\" he said finally.", "zh": "他最後說：「這其實不是節目該談的東西。」"}, {"en": "Bernice looked at him closely.", "zh": "Bernice 仔細地看著他。"}, {"en": "\"That's the first question you've ever tried not to answer,\" she said.", "zh": "她說：「這是你第一次不想回答的問題。」"}, {"en": "Mr. Pan almost smiled. \"You two really have gotten good at this.\"", "zh": "潘老師幾乎笑了：「你們兩個真的越來越擅長這個了。」"}, {"en": "\"So there is an answer,\" Coco said. \"You're just not ready to give it.\"", "zh": "Coco 說：「所以是有答案的，你只是還沒準備好說出來。」"}, {"en": "Mr. Pan didn't argue with that.", "zh": "潘老師沒有反駁這句話。"}, {"en": "Instead of pushing further, they decided to try their usual first step: check the records.", "zh": "他們沒有繼續逼問，而是決定用平常的第一步：查資料。"}, {"en": "The school office had a thin file about the podcast club, started six years ago.", "zh": "學校辦公室有一份關於這個 podcast 社團的薄薄資料，六年前成立的。"}, {"en": "Mr. Pan's name was listed as the teacher who asked for it, along with one short line: \"Reason: personal.\"", "zh": "資料上寫著潘老師是申請成立的老師，還有一行簡短的字：「原因：個人因素。」"}, {"en": "\"Personal,\" Bernice repeated. \"That's not much to work with.\"", "zh": "Bernice 重複著：「個人因素，這句話不太夠用。」"}, {"en": "Coco kept reading. Under the club's original name, someone had written something different from \"The Friday Box.\"", "zh": "Coco 繼續讀下去。在社團原本的名字底下，有人寫了一個跟「Friday Box」不一樣的名字。"}, {"en": "It said: \"The Ten Minute Club.\"", "zh": "上面寫著：「十分鐘社。」"}, {"en": "Coco went completely still for a second.", "zh": "Coco 有那麼一秒鐘完全靜止不動。"}, {"en": "\"Ten minutes,\" she said slowly. \"Like the clock. Like case one.\"", "zh": "她慢慢地說：「十分鐘，就像那個鐘，就像案件一。」"}, {"en": "Bernice's eyes went wide. \"Mr. Pan knew about Ms. Ho's clock before we ever found it, didn't he?\"", "zh": "Bernice 的眼睛睜大了：「潘老師在我們發現之前，就已經知道何老師的鐘了，對不對？」"}, {"en": "Neither of them said anything else for a long moment. Some questions, they were learning, needed time before you asked them out loud.", "zh": "有好長一段時間，他們兩個都沒再說話。他們漸漸明白，有些問題在說出口之前，需要一點時間。"}, {"en": "The old file also listed a small item nobody understood at first: a single glass jar, kept safe on a shelf in the office.", "zh": "那份舊資料裡還列了一件一開始沒人看懂的物品：一個被小心放在辦公室架上的玻璃罐。"}, {"en": "In science class that week, they studied the earth, the moon, and how each planet moved around the sun.", "zh": "那個星期的科學課，他們學習地球、月亮，還有每顆行星怎麼繞著太陽轉。"}, {"en": "One night, Mr. Pan brought a small telescope so anyone could look at a bright star after class.", "zh": "有天晚上，潘老師帶了一台小望遠鏡，讓下課後想看星星的人都可以看。"}, {"en": "\"Nature doesn't care about our school schedule,\" he said, looking up at the clear, cold sky.", "zh": "他抬頭看著清澈寒冷的夜空說：「大自然才不管我們學校的課表。」"}, {"en": "Bernice joked that even a small rock on the ground had probably existed longer than their entire school building.", "zh": "Bernice 開玩笑說，地上一顆小石頭大概都比他們整棟學校還要古老。"}], "quiz": [{"question": "What does Coco ask Mr. Pan directly at the start of the chapter?", "options": ["Who started the Friday Box", "Why the clock is slow" , "pos": "n./v./adv./adj.", "zh": "最後的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 22, "pastForm": "lasted", "pastParticipleForm": "lasted"}, {"word": "own", "pos": "adj./pron./v.", "zh": "自己的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23, "pastForm": "owned", "pastParticipleForm": "owned"}, {"word": "simple", "pos": "adj.", "zh": "簡單的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23}, {"word": "hot", "pos": "adj.", "zh": "熱的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23}, {"word": "bath", "pos": "n.", "zh": "洗澡", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23}, {"word": "dinner", "pos": "n.", "zh": "晚餐", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23}, {"word": "early", "pos": "adj./adv.", "zh": "早期的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23, "pastForm": "earlyed", "pastParticipleForm": "earlyed"}, {"word": "exciting", "pos": "adj.", "zh": "令人興奮的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 24}, {"word": "honest", "pos": "adj.", "zh": "誠實的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 24}, {"word": "work", "pos": "n./v.", "zh": "工作", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 24, "pastForm": "worked", "pastParticipleForm": "worked"}], "extraHighlightWords": [{"word": "podcast", "pos": "n.", "zh": "Podcast；網路廣播節目", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 19, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "Ms. Ho still kept a small, worn photograph of that same group in her wallet, she admitted, a little embarrassed.", "zh": "何老師有點不好意思地承認，她皮夾裡到現在還留著同一張已經磨損的舊照片。"}, {"en": "They didn't go back to Mr. Pan right away. Instead, they went to find Ms. Ho.", "zh": "他們沒有馬上回去找潘老師，而是先去找何老師。"}, {"en": "She was surprised to see them again. \"Case one is already finished,\" she said, smiling.", "zh": "她很驚訝又看到他們：「案件一已經結束了，」她笑著說。"}, {"en": "\"It is,\" Coco said. \"But we found something with your club's name in it. The Ten Minute Club.\"", "zh": "Coco 說：「是的，但我們找到一個東西，上面有你們社團的名字，十分鐘社。」"}, {"en": "Ms. Ho's smile changed, just a little.", "zh": "何老師的笑容微微變了。"}, {"en": "\"That name,\" she said, \"was used by more than one club, over the years.\"", "zh": "她說：「這個名字，這些年來不只一個社團用過。」"}, {"en": "\"Was one of your students named Pan?\" Bernice asked. \"A long time ago?\"", "zh": "Bernice 問：「你以前的學生裡，有沒有一個姓潘的？很久以前？」"}, {"en": "Ms. Ho was quiet for a long moment, the same way she had been quiet in Chapter 3.", "zh": "何老師沉默了好一會兒，就像她在第三章那時一樣安靜。"}, {"en": "\"He was a quiet boy,\" she said finally. \"New to the school. He didn't talk much in class.\"", "zh": "她最後說：「他是個安靜的男孩，剛轉來學校，上課不太說話。」"}, {"en": "\"He came to Sunrise Club every morning, without fail, for almost two years.\"", "zh": "「他每天早上都會來晨光社，從不缺席，持續了快兩年。」"}, {"en": "\"Those ten minutes were the only part of his day,\" she said, \"where nobody expected anything from him.\"", "zh": "她說：「那十分鐘，是他一天裡唯一沒有人對他有所期待的時刻。」"}, {"en": "Coco felt something change quietly inside her.", "zh": "Coco 覺得心裡有什麼東西悄悄地變了。"}, {"en": "When the club ended, she said, that same quiet boy asked her one question: \"What happens to people like me, once the ten minutes are gone?\"", "zh": "社團結束的時候，她說，那個安靜的男孩問了她一個問題：「像我這樣的人，十分鐘沒了以後怎麼辦？」"}, {"en": "\"I didn't have a good answer then,\" Ms. Ho said. \"I still don't know if I do now.\"", "zh": "何老師說：「我那時候沒有一個好答案，現在也還是不確定有沒有。」"}, {"en": "Bernice looked at Coco. Neither of them needed to say Mr. Pan's name out loud.", "zh": "Bernice 看著 Coco，他們兩個都不需要把潘老師的名字說出口。"}, {"en": "That afternoon, they found Mr. Pan alone in the classroom, grading papers after everyone else had left.", "zh": "那天下午，他們在教室裡找到獨自一人的潘老師，其他人都走了，他還在改作業。"}, {"en": "\"We talked to Ms. Ho,\" Coco said quietly. \"We know about the Ten Minute Club.\"", "zh": "Coco 小聲說：「我們跟何老師談過了，我們知道十分鐘社的事。」"}, {"en": "Mr. Pan put down his pen and didn't look surprised at all.", "zh": "潘老師放下筆，看起來一點也不驚訝。"}, {"en": "\"I wondered how long it would take,\" he said. \"You two ask better questions than I ever did.\"", "zh": "他說：「我在想你們什麼時候會查到，你們兩個問問題的能力比我當年強多了。」"}, {"en": "\"So it's true,\" Bernice said. \"You started the podcast because of that club.\"", "zh": "Bernice 說：「所以是真的，你開始這個 podcast 是因為那個社團。」"}, {"en": "\"I started it,\" Mr. Pan said, \"because nobody wrote down what those ten minutes meant to me. I wanted this school to notice things before they disappear, not fourteen years after.\"", "zh": "潘老師說：「我開始這個節目，是因為沒有人寫下那十分鐘對我的意義。我希望這間學校能在事情消失之前就注意到，而不是十四年後才發現。」"}, {"en": "As a teenager, Mr. Pan had been quiet, a little lonely, and easily embarrassed in front of a large group.", "zh": "潘老師少年時期很安靜，有點孤單，在一大群人面前很容易不好意思。"}, {"en": "Ms. Ho remembered him as polite, careful, and always the last student to leave the classroom.", "zh": "何老師記得他很有禮貌、做事謹慎，總是最後一個離開教室的學生。"}, {"en": "Mr. Pan admitted his own after-school routine was simple: a hot bath, a quiet dinner, and an early bedtime.", "zh": "潘老師坦承他放學後的日常很簡單：洗個熱水澡、安靜地吃晚餐，然後早早睡覺。"}, {"en": "\"It's not exciting,\" he said, \"but it's honest, and it works for me.\"", "zh": "他說：「這不算精采，但很老實，對我來說很有用。」"}], "quiz": [{"question": "Who was the quiet boy in Ms. Ho's Sunrise Club, years ago?", "options": ["Mr. Pan, when he was a student", "Mr. Tan", "Mr. Huang", "Wei"], "answer": 0}, {"question": "What did the ten minutes mean to the quiet boy?", "options": ["It was the only part of his day when nobody expected anything from him", "It was time to do extra homework", "It was a punishment", "It was time to clean the classroom"], "answer": 0}, {"question": "What does \"expect\" mean in \"nobody expected anything from him\"?", "options": ["期待", "忘記", "拒絕", "害怕"], "answer": 0}, {"question": "Why did Mr. Pan start the podcast club?", "options": ["So the school would notice things before they disappear, not years later", "Because a teacher told him to", "To win a school competition", "Because he needed extra credit"], "answer": 0}]}, {"level": 1, "chapter": 21, "title": "The m": "bettered"}, {"word": "prepare", "pos": "v.", "zh": "準備", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 21, "pastForm": "prepared", "pastParticipleForm": "prepared"}, {"word": "plan", "pos": "n./v.", "zh": "計劃", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 21, "pastForm": "planed", "pastParticipleForm": "planed"}, {"word": "enjoy(ment)", "pos": "v./(n.)", "zh": "享受）", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 21, "pastForm": "enjoyed", "pastParticipleForm": "enjoyed"}, {"word": "free", "pos": "adj./v./adv.", "zh": "自由的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 21, "pastForm": "freed", "pastParticipleForm": "freed"}, {"word": "afternoon", "pos": "n.", "zh": "午安", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 21}, {"word": "celebrate", "pos": "v.", "zh": "慶祝", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 22, "pastForm": "celebrated", "pastParticipleForm": "celebrated"}, {"word": "bicycle/bike", "pos": "n.", "zh": "自行車/自行車", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 22}, {"word": "ride", "pos": "n./v.", "zh": "騎", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 22, "pastForm": "rided", "pastParticipleForm": "rided"}, {"word": "clear", "pos": "adj./v./adv.", "zh": "清除", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 22, "pastForm": "cleared", "pastParticipleForm": "cleared"}, {"word": "mind", "pos": "n./v.", "zh": "頭腦", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 22, "pastForm": "minded", "pastParticipleForm": "minded"}, {"word": "homework", "pos": "n.", "zh": "家庭作業", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 22}], "extraHighlightWords": [{"word": "episode", "pos": "n.", "zh": "一集；事件", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 2, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "Coco's mother asked her that night why she looked so quiet at dinner, and Coco just smiled and said it was a good kind of quiet.", "zh": "那天晚上，Coco 的媽媽問她晚餐時為什麼這麼安靜，Coco 只是笑了笑，說這是一種很好的安靜。"}, {"en": "Nobody said anything for a while after Mr. Pan finished speaking.", "zh": "潘老師說完之後，有好一會兒沒有人說話。"}, {"en": "Bernice was the first to break the silence. \"Can we make an episode about this?\"", "zh": "Bernice 先打破沉默：「我們可以做一集關於這件事的節目嗎？」"}, {"en": "\"Only if you want us to,\" Coco added quickly. \"You don't have to say yes.\"", "zh": "Coco 很快補充：「只有在你願意的時候才做，你不用答應。」"}, {"en": "Mr. Pan thought about it for a long moment before answering.", "zh": "潘老師想了好一會兒才回答。"}, {"en": "\"Not the whole story,\" he said. \"Not my name as the boy in it. Just... the idea.\"", "zh": "他說：「不要講整件事，也不要說那個男孩是我，就講⋯⋯這個想法就好。」"}, {"en": "\"That's exactly what Mei said, too,\" Bernice said. \"About the practice room.\"", "zh": "Bernice 說：「Mei 之前也是這麼說的，關於練習室的事。」"}, {"en": "Mr. Pan almost laughed. \"Then maybe you two have learned the most important rule of all.\"", "zh": "潘老師幾乎笑了出來：「那也許你們兩個已經學會了最重要的那條規則。」"}, {"en": "\"Which one?\" Coco asked.", "zh": "Coco 問：「哪一條？」"}, {"en": "\"Ask what someone actually wants,\" he said, \"before you decide what their story means.\"", "zh": "他說：「先問一個人真正想要什麼，再決定他們的故事代表什麼意義。」"}, {"en": "That weekend, Coco tried writing the words for the new episode three separate times.", "zh": "那個週末，Coco 試著把新一集的內容寫了三次。"}, {"en": "The first try explained every case in detail. She did not keep it.", "zh": "第一次嘗試詳細解釋了每一個案子，她沒有留下這個版本。"}, {"en": "The second try tried to be funny, like the bakery episode. It didn't feel right either.", "zh": "第二次嘗試想寫得像麵包店那一集一樣好笑，但感覺也不太對。"}, {"en": "The third try was short. It simply said: some people build something for others because nobody built it for them.", "zh": "第三次嘗試很短，只寫了一句話：有些人為別人建立一件事，是因為當初沒有人為他們做過。"}, {"en": "Bernice read it once and put down her phone. \"That's the one,\" she said.", "zh": "Bernice 讀了一次，把手機放下：「就是這個，」她說。"}, {"en": "They recorded the episode together, all three of them in the room this time: Coco, Bernice, and Mr. Pan.", "zh": "這一次三個人一起錄音：Coco、Bernice，還有潘老師。"}, {"en": "Mr. Pan spoke only one line on the recording, near the end.", "zh": "潘老師在錄音裡只說了一句話，在快結束的時候。"}, {"en": "\"If something helped you once,\" he said, \"the best thing you can do is help make sure it's still there for someone else.\"", "zh": "他說：「如果有件事曾經幫過你，最好的做法就是確保它還在，好讓它能幫到別人。」"}, {"en": "When the episode ended, none of them spoke for a moment. It felt like the right kind of quiet.", "zh": "節目結束後，他們三個有那麼一刻都沒有說話，那是一種恰到好處的安靜。"}, {"en": "On Saturdays, Coco had to cook breakfast, feed the neighbor's cat, and cut the grass in the small yard behind her building.", "zh": "每個星期六，Coco 得煮早餐、餵鄰居的貓，還要修剪公寓後面小院子的草。"}, {"en": "She would draw a quick chore list, cross off each task, and save the hardest one for last.", "zh": "她會畫一張簡單的家事清單，做完一項就劃掉，把最難的留到最後。"}, {"en": "Her aunt always said it was better to prepare a plan first than to enjoy a free afternoon with no plan at all.", "zh": "阿姨總是說，與其毫無計畫地享受一個空閒下午，不如先準備好計畫。"}, {"en": "Once she finished, Coco liked to celebrate with a short bike ride, just to clear her mind before homework.", "zh": "做完之後，Coco 喜歡騎一小段腳踏車慶祝一下，寫作業前先清空腦袋。"}], "quiz": [{"question": "What does Mr. Pan agree to, and not agree to, for the new episode?", "options": ["The idea, but not his name or the whole story", "Everything, with no limits", "Nothing at all", "Only if Ms. Ho appears too"], "answer": 0}, {"question": "What rule does Mr. Pan say Coco and Bernice have learned?", "options": ["Ask what someone actually wants before deciding what their story means", "Always guess first", "Never ask twice", "Keep every secret forever"], "answer": 0}, {"question": "What does \"keep\" mean in \"she did not keep it\"?", "options": ["保留", "丟棄", "尋找", "修理"], "answer": 0}, {"question": "What is Mr. Pan's one line in the final recording?", "options": ["Help make sure something that once helped you is still there for someone else", "This school has too many rules", "The podcast is ending forever", "Everyone should learn to play guitar"], "answer": 0}]}, {"level": 1, "chapter": 22, "title": "The List", "targetWords": [{"word": "even", "pos": "adv./adj./v.", "zh": "甚至", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "evened", "pastParticipleForm": "evened"}, {"word": "school", "pos": "n./v.", "zh": "學校", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "schooled", "pastParticipleForm": "schooled"}, {"word": "nurse", "pos": "n./v.", "zh": "護士", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "nursed", "pastParticipleForm": "nursed"}, {"word": "add", "pos": "v.", "zh": "添加", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "added", "pastParticipleForm": "added"}, {"word": "name", "pos": "n./v.", "zh": "姓名", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "named", "pastParticipleForm": "named"}, {"word": "list", "pos": "n./v.", "zh": "清單", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "listed", "pastParticipleForm": "listed"}, {"word": "first", "pos": "n./adv./adj.", "zh": "第一的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "firsted", "pastParticipleForm": "firsted"}, {"word": "week", "pos": "n.", "zh": "星期", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "ask", "pos": "v.", "zh": "問", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "asked", "pastParticipleForm": "asked"}, {"word": "corner", "pos": "n.", "zh": "角落", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "rest", "pos": "n./v.", "zh": "休息", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "rested", "pastParticipleForm": "rested"}, {"word": "during", "pos": "prep.", "zh": "期間", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "break", "pos": "n./v.", "zh": "休息", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, y admitted he had never noticed the quiet kid who sat behind him all year.", "zh": "一個男生坦承，他整年都沒注意到坐在他後面那個安靜的同學。"}, {"en": "A teacher asked Mr. Pan, half joking, if the school should build \"a Ten Minute Club\" of its own again.", "zh": "一位老師半開玩笑地問潘老師，學校是不是該重新辦一個「十分鐘社」。"}, {"en": "Mr. Pan didn't answer right away, but Coco noticed he wrote something down afterward.", "zh": "潘老師沒有馬上回答，但 Coco 注意到他後來寫了些什麼。"}, {"en": "A week later, the school told everyone something new: any student could ask for a quiet space, a practice room, or a small kind of help, without needing a special reason.", "zh": "一星期後，學校告訴大家一件新事情：任何學生都可以申請安靜空間、練習室，或一點小小的幫助，不需要什麼特別的理由。"}, {"en": "They called it, simply, \"The List.\" No long explanation, no long rules. Just a place to write down what you needed.", "zh": "他們就簡單地把它叫做「清單」，沒有長篇解釋，沒有一堆規則，只是一個寫下你需要什麼的地方。"}, {"en": "\"That's it,\" Bernice said, reading the notice. \"That's basically Locker 113, but official.\"", "zh": "Bernice 讀著告示說：「就是這個，這根本就是113號置物櫃，只是變成正式的了。」"}, {"en": "\"Maybe that's how it should work,\" Coco said. \"Small things first. Rules later, if they're even needed.\"", "zh": "Coco 說：「也許本來就該這樣，先有小小的事情，需要的話規則之後再說。」"}, {"en": "The Friday Box, meanwhile, kept receiving notes, faster than ever before.", "zh": "與此同時，Friday Box 收到紙條的速度，比以前任何時候都快。"}, {"en": "Some were new mysteries. Some were simple thank-yous. A few were just single words: \"seen,\" \"helped,\" \"better.\"", "zh": "有些是新的謎團，有些只是簡單的謝謝，還有幾張只寫了一個字：「被看見」、「被幫助」、「變好了」。"}, {"en": "Coco started a new page in her notebook just for these short notes, separate from the cases.", "zh": "Coco 在筆記本裡開了新的一頁，專門放這些短短的紙條，跟案子分開放。"}, {"en": "She didn't have a name for that page yet, but she had a feeling it might end up being the most important one.", "zh": "她還沒幫這一頁取名字，但她有種感覺，這一頁可能會是最重要的一頁。"}, {"en": "One student asked The List for something simple: a clean, quiet place to change clothes before an after-school swim class.", "zh": "一個學生在清單上申請了一件很簡單的事：放學後上游泳課前，一個乾淨安靜的更衣空間。"}, {"en": "Another asked for a warm place to wait during winter, since the school gate could be cold and windy in the morning.", "zh": "另一個學生申請一個冬天可以取暖的地方，因為早上校門口又冷又有風。"}, {"en": "At the end-of-term assembly, the principal gave a short speech about the year.", "zh": "學期末的週會上，校長對這一年做了一段簡短的致詞。"}, {"en": "\"Every student has the ability to notice something small and act on it,\" she said.", "zh": "她說：「每個學生都有能力去注意到一件小事，並且採取行動。」"}, {"en": "\"This isn't about business, or about being popular. It's about paying attention.\"", "zh": "「這跟做生意無關，也跟受不受歡迎無關，這是關於用心去注意。」"}, {"en": "\"You had the choice to look away from a strange clock, an empty locker, or a barking dog,\" she continued.", "zh": "她接著說：「你們原本可以選擇對一個奇怪的鐘、一個空的置物櫃，或一隻愛叫的狗視而不見。」"}, {"en": "\"Instead, you asked a question, and that experience changed how this whole school pays attention to itself.\"", "zh": "「但你們卻選擇去問問題，而這個經驗改變了整間學校關注彼此的方式。」"}, {"en": "She thanked the podcast club for its interest in the school's daily life, calling it a useful example for younger students.", "zh": "她感謝這個 podcast 社團對校園日常生活的關注，稱讚它是給學弟妹的好榜樣。"}, {"en": "\"I have no doubt,\" she added, \"that next year's students will carry on the same habit of asking good questions.\"", "zh": "她補充說：「我相信，明年的學生一定會延續這個問好問題的習慣。」"}, {"en": "The whole hall clapped, and for once, Bernice didn't make a joke about it.", "zh": "全場鼓掌，這一次，Bernice 沒有拿這件事開玩笑。"}], "quiz": [{"question": "What does the whole school seem to understand, without anyone saying it out loud?", "options": ["Who the new episode is really about", "The answer to case one", "Mr. Pan's phone number", "The name of the bakery"], "answer": 0}, {"question": "What is \"The List\" that the school creates?", "options": ["A simple way for any student to ask for quiet space or help, without a special reason", "A list of students who broke rules", "A list of podcast episodes", "A list of missing lockers"], "answer": 0}, {"question": "What does \"notice\" mean here?", "options": ["告示；注意到", "秘密", "危險", "問題"], "answer": 0}, {"question": "W "}], "sentences": [{"en": "The weather that spring stayed mild and sunny, and the tree outside the classroom window grew its first new green leaves.", "zh": "那個春天天氣一直很溫和晴朗，教室窗外那棵樹也長出了今年第一批新的綠葉。"}, {"en": "In the weeks that followed, Coco noticed small changes she almost missed.", "zh": "接下來幾個星期，Coco 注意到一些幾乎沒被發現的小改變。"}, {"en": "Wei still checked the vending machine every few days, but now he laughed about it instead of worrying.", "zh": "Wei 還是每隔幾天就去看一下那台自動販賣機，但現在他是笑著看，不再擔心了。"}, {"en": "Mei's name appeared on the practice room list every single week, right at the top.", "zh": "Mei 的名字每個星期都出現在練習室名單上，而且都排在最前面。"}, {"en": "Locker 113 still had something inside almost every day, though nobody ever agreed on exactly who was doing it.", "zh": "113號置物櫃幾乎每天還是有東西，雖然沒有人真正說得清楚是誰在做這件事。"}, {"en": "Even Momo the dog became a little famous, with students stopping by at 3:33 just to watch her bark.", "zh": "連 Momo 這隻狗都變得有點出名，會有學生特地在三點三十三分過來看她叫。"}, {"en": "\"We didn't fix the school,\" Bernice said one afternoon. \"We just helped people notice it a little more.\"", "zh": "某天下午 Bernice 說：「我們並沒有修好這間學校，我們只是幫大家多注意到它一點。」"}, {"en": "\"Maybe that's enough, most of the time,\" Coco said.", "zh": "Coco 說：「大多數時候，也許這樣就夠了。」"}, {"en": "Ms. Ho stopped by the podcast room once, just to say the clock still ran ten minutes slow, exactly as before.", "zh": "何老師來過 podcast 教室一次，只是想說那個鐘還是一樣慢十分鐘，跟以前一樣。"}, {"en": "\"Some things,\" she said, \"don't need to change to still matter.\"", "zh": "她說：「有些事情，不需要改變，也一樣重要。」"}, {"en": "Mr. Pan kept teaching English every day, same as always, and never once brought up the Ten Minute Club again.", "zh": "潘老師每天還是照常教英文，再也沒有提過十分鐘社的事。"}, {"en": "But Coco noticed he always arrived exactly ten minutes before class started, every single morning.", "zh": "但 Coco 注意到，他每天早上總是提早十分鐘到教室。"}, {"en": "She never asked him why. Some questions, she had learned, were better left as quiet understanding.", "zh": "她從來沒問過他為什麼，她學到了，有些問題留著默默懂就好，不用問出口。"}, {"en": "As the school year came toward its end, Coco and Bernice sat down to plan their final episode of the year.", "zh": "隨著這學年快要結束，Coco 和 Bernice 坐下來計畫這一年的最後一集。"}, {"en": "\"Six cases,\" Bernice said, counting on her fingers. \"No, wait. Seven, if we count our own.\"", "zh": "Bernice 一邊數手指一邊說：「六個案子，不對，等等，七個，如果把我們自己也算進去的話。」"}, {"en": "Coco smiled. \"Maybe that one was always the real one.\"", "zh": "Coco 笑了：「也許那一個，才一直是真正的那個案子。」"}, {"en": "The school's pet rabbit in the science room grew fat over the winter and needed a bigger cage.", "zh": "科學教室裡養的那隻兔子過完冬天變胖了，需要換一個更大的籠子。"}, {"en": "A bee got into the classroom one afternoon, and the whole room went a little crazy for five minutes.", "zh": "有天下午一隻蜜蜂飛進教室，全班瘋狂了整整五分鐘。"}, {"en": "Someone's pet snake escaped during a science project and was found asleep under a bench two days later.", "zh": "有人做科展的寵物蛇跑掉了，兩天後才在一張長椅底下找到牠睡著。"}, {"en": "A stray cat had kittens behind the gym, and half the school visited them at lunch.", "zh": "一隻流浪貓在體育館後面生了小貓，全校一半的人都跑去午餐時間看牠們。"}, {"en": "The farmer who sold vegetables near the school gate started bringing ham and cheese to sell too.", "zh": "在校門口賣蔬菜的農夫，開始也賣起火腿和起司。"}, {"en": "On rainy days, the whole hallway smelled like wet clothes and warm soup from the cafeteria.", "zh": "下雨天，整條走廊都聞得到濕衣服和餐廳熱湯的味道。"}, {"en": "A new foreign student joined their class in October, and everyone tried to be extra friendly.", "zh": "十月時班上來了一位外籍新生，大家都特別努力對他友善。"}, {"en": "The school held a small festival in the courtyard, with paper lanterns and a table full of homemade cakes.", "zh": "學校在中庭辦了一個小小的園遊會，掛滿紙燈籠，還有一整桌自製蛋糕。"}, {"en": "Coco's father, an engineer, came to talk about his job during career week.", "zh": "職涯週的時候，Coco 當工程師的爸爸來班上分享他的工作。"}, {"en": "Bernice's cousin, a nurse at the city hospital, spoke to their health class about staying healthy.", "zh": "Bernice 在市立醫院當護理師的表姊，來健康課跟大家聊怎麼保持健康。"}, {"en": "A police officer visited too, along with the owner of the small shop near the market.", "zh": "一位警察也來了，還有市場附近那間小商店的老闆。"}, {"en": "On the class trip, they saw a giant elephant, a sleepy lion, and two monkeys fighting over a banana at the zoo.", "zh": "校外教學時，他們在動物園看到一頭巨大的大象、一隻愛睏的獅子，還有兩隻猴子在搶一根香蕉。"}, {"en": "Bernice bought a toy tiger from the gift shop, even though she said she was too old for toys.", "zh": "Bernice 在紀念品店買了一隻玩具老虎，雖然她說自己已經太大了不該玩玩具。"}, {"en": "On the way home, the bus passed a small farm with cows and sheep resting quietly in the field.", "zh": "回程的路上，公車經過一座小農場，牛和羊安靜地在田裡休息。"}, {"en": "A bird built a nest above the classroom window, and everyone worried about the baby birds inside.", "zh": "一隻鳥在教室窗戶上方築了巢，大家都很擔心裡面的小鳥寶寶。"}, {"en": "In science class, they learned how tiny insects like ants and bees help flowers and plants grow.", "zh": "在科學課上，他們學到像螞蟻和蜜蜂這樣的小昆蟲，如何幫助花朵和植物生長。"}, {"en": "Coco's family celebrated her cousin's wedding that spring; her aunt wore a beautiful new dress and her uncle told the same joke three times.", "zh": "那年春天，Coco 一家人參加了表姊的婚禮，阿姨穿了一件漂亮的新洋裝，叔叔把同一個笑話講了三次。"}, {"en": "At the wedding, there was a huge dinner with duck, beef, fresh bread, and a giant cake shaped like a heart.", "zh": "婚禮上有一頓豐盛的晚餐，有鴨肉、牛肉、新鮮麵包，還有一個心型的大蛋糕。"}, {"en": "Every one of these small moments felt separate at the time, Coco thought, but somehow they all belonged to the same busy, ordinary year.", "zh": "Coco 覺得，這些小小的時刻在當下都感覺各自獨立，但不知怎麼地，它們全都屬於同一個忙碌又平凡的一年。"}, {"en": "Sometimes, during a boring class, Coco would daydream about traveling abroad: a quiet island, a big city with tall towers, or a small town near the sea.", "zh": "有時候上課很無聊，Coco 會做白日夢，想像出國旅行：一座安靜的島、一個高樓林立的大城市，或是海邊的一個小鎮。"}, {"en": "She imagined taking an airplane to the south, then a taxi from the airport straight to a cheap little hotel by the water.", "zh": "她想像搭飛機往南飛，再從機場搭計程車直接到海邊一間便宜的小旅館。"}, {"en": "Bernice's daydream was simpler: a national park with a river, a boat, and absolutely no phone reception.", "zh": "Bernice 的白日夢比較簡單：一座有河流、有船，而且完全沒有手機訊號的國家公園。"}], "quiz": [{"question": "What does Ms. Ho say when she visits the podcast room?", "options": ["Some things don't need to change to still matter", "The clock has finally been fixed", "She wants to join the podcast", "She is moving away"], "answer": 0}, {"question": "What does Coco notice about Mr. Pan's daily habit?", "options": ["He always arrives exactly ten minutes before class", "He never comes to class on time", "He stopped teaching English", "He avoids Room 306"], "answer": 0}, {"question": "What does \"matter\" mean in \"still matter\"?", "options": ["重要", "危險", "秘密", "困難"], "answer": 0}, {"question": "Which case does Bernice count as the seventh?", "options": ["Their own story, the Ten Minute Club", "The dog case", "A brand new case", "The locker case again"], "answer": 0}]}, {"level": 1, "chapter": 24, "title": "The Right Question", "targetWords": [{"word": "outside", "pos": "prep./adv./adj./n.", "zh": "外部", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "outsided", "pastParticipleForm": "outsided"}, {"word": "sky", "pos": "n.", "zh": "天空", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "wide", "pos": "adj./adv.", "zh": "寬的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "wided", "pastParticipleForm": "wided"}, {"word": "warm", "pos": "adj./v.", "zh": "溫暖的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "warmed", "pastParticipleForm": "warmed"}, {"word": "blue", "pos": "adj./n.", "zh": "藍色的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "whole", "pos": "adj./n.", "zh": "所有的", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 0}, {"word": "school", "pos": "n./v.", "zh": "學校", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "schooled", "pastParticipleForm": "schooled"}, {"word": "quiet", "pos": "adj./n./v.", "zh": "安靜的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "quieted", "pastParticipleForm": "quieted"}, {"word": "calm", "pos": "v./adj./n", "zh": "冷靜的",
