eIndex": 31}, {"word": "next", "pos": "adj./adv.", "zh": "下一個", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 31, "pastForm": "nexted", "pastParticipleForm": "nexted"}, {"word": "certain", "pos": "adj./pron.", "zh": "肯定", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 32}, {"word": "worth", "pos": "adj./n.", "zh": "值得", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 32}], "extraHighlightWords": [{"word": "hallway", "pos": "n.", "zh": "（室內）走廊", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 12, "highlightType": "extra-high-frequency"}, {"word": "vending machine", "pos": "n.", "zh": "自動販賣機", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 19, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "Outside, the summer sky was a wide, warm blue, and the whole school felt unusually quiet and calm.", "zh": "外面的夏日天空又寬又暖，藍藍的一片，整間學校難得地安靜又平和。"}, {"en": "On the last Friday of the school year, the Friday Box looked different: someone had drawn small pictures all over it.", "zh": "這學年最後一個星期五，Friday Box 看起來不太一樣：有人在上面畫滿了小圖畫。"}, {"en": "Coco lifted the lid one final time before summer break and found it completely empty.", "zh": "暑假前，Coco 最後一次打開蓋子，發現裡面完全空了。"}, {"en": "\"Empty,\" Bernice said. \"For the first time all year.\"", "zh": "Bernice 說：「空的，這一整年第一次。」"}, {"en": "\"Maybe everyone already said what they needed to say,\" Coco said.", "zh": "Coco 說：「也許大家想說的話都已經說完了。」"}, {"en": "Mr. Pan joined them outside the classroom, holding two cups of tea.", "zh": "潘老師拿著兩杯茶，走到教室外面加入他們。"}, {"en": "\"Seven cases,\" he said. \"Not bad, for one school year.\"", "zh": "他說：「七個案子，一個學年來說已經不錯了。」"}, {"en": "Looking back, Coco found it hard to believe how many small, unrelated things had filled the whole year.", "zh": "回頭看，Coco 很難相信這一整年竟然塞滿了這麼多不相關的小事。"}, {"en": "There was the week a bat got into the gym and everyone had to wait outside for an hour.", "zh": "有一個星期，一隻蝙蝠飛進體育館，大家得在外面等一個鐘頭。"}, {"en": "There was the afternoon a duck wandered onto the field during a school game, and nobody wanted to chase it away.", "zh": "有一天下午，一隻鴨子在校慶活動時晃進操場，沒有人想把牠趕走。"}, {"en": "A mouse once ran across the office floor, and even the calmest teacher jumped onto a chair.", "zh": "有一次一隻老鼠跑過辦公室地板，連最冷靜的老師都嚇得跳上椅子。"}, {"en": "One boy in another class brought his pet frog to school in his jacket pocket, which everyone agreed was a mistake.", "zh": "另一班有個男生把他養的青蛙放在外套口袋裡帶來學校，大家都同意這是個錯誤的決定。"}, {"en": "There was a week when the whole school smelled like fresh paint, because workers were fixing the hallway walls.", "zh": "有一個星期整間學校都是新油漆的味道，因為工人正在修理走廊的牆壁。"}, {"en": "A famous actor visited a nearby school once, and half their class walked over just to see him for two minutes.", "zh": "有一位知名演員去了附近一間學校，他們班有一半的人特地走過去，就為了看他兩分鐘。"}, {"en": "One rainy season, the field turned to mud, and every student's shoes were a mess for a week.", "zh": "有一個多雨的季節，操場變成一片泥濘，全校學生的鞋子髒了整整一星期。"}, {"en": "There was a strange hour in November when the whole sky turned orange before a storm, and everyone stopped to look.", "zh": "十一月有一個奇怪的時刻，暴風雨前整片天空變成橘色，大家都停下來看。"}, {"en": "A local reporter came to interview the class about their garden project, though the story never actually got printed.", "zh": "一位地方記者來採訪他們班的花園計畫，不過這則報導最後並沒有真的刊出來。"}, {"en": "Coco's neighbor, an old soldier, once told her long stories about a country far away that she had never heard of before.", "zh": "Coco 的鄰居是一位退伍軍人，曾經跟她講過一個她從沒聽過、很遙遠的國家的長篇故事。"}, {"en": "A visitor from another country once got lost near the school gate, holding a paper map upside down.", "zh": "有一次一位外國訪客在校門口附近迷路了，手上拿著一張拿反的紙本地圖。"}, {"en": "There was a whole week when the vending machine only sold orange soda, which made Wei strangely happy.", "zh": "有一整個星期，自動販賣機只剩下橘子汽水在賣，這讓 Wei 莫名開心。"}, {"en": "One quiet afternoon, someone found a small bird's nest with three eggs, hidden behind a flowerpot near the office window.", "zh": "有個安靜的下午，有人在辦公室窗邊一個花盆後面，發現了一個裡面有三顆蛋的小鳥巢。"}, {"en": "None of these moments belonged to any case, and none of them ever needed to be solved.", "zh": "這些片刻沒有一個屬於任何案子，也沒有一個需要被解開。"}, {"en": "They were simply proof, Coco decided, that an ordinary school year could still be full of strange and lovely surprises.", "zh": "Coco 決定，這些只是一個證明：就算是平凡的學年，也能充滿奇怪又美好的驚喜。"}, {"en": "\"Eight, if the box counts as one,\" Bernice said, smiling.", "zh": "Bernice 笑著說：「八個，如果把箱子本身也算一個的話。」"}, {"en": "Coco opened her notebook to the very last page and read her own words from the very first case, months ago.", "zh": "Coco 翻開筆記本的最後一頁，讀著幾個月前第一個案子時她自己寫下的話。"}, {"en": "\"A good question always starts with someone's real life,\" it said.", "zh": "上面寫著：「好的問題，永遠是從某個人真實的生活開始的。」"}, {"en": "She had believed that sentence back then. Now, after seven cases, she understood it in a completely different way.", "zh": "她那時候相信這句話，現在，經過七個案子，她用一種完全不同的方式理解了它。"}, {"en": "\"What are you going to write on the last page?\" Bernice asked.", "zh": "Bernice 問：「你要在最後一頁寫什麼？」"}, {"en": "Coco thought for a moment, then wrote one sentence, slowly.", "zh": "Coco 想了一下，然後慢慢寫下一句話。"}, {"en": "\"Every school is full of quiet things people are doing for each other. You just have to ask the right question to see them.\"", "zh": "「每間學校裡，都充滿了人們默默為彼此做的小事，你只需要問對問題，就能看見它們。」"}, {"en": "Bernice read it over her shoulder and nodded, without making a joke this time.", "zh": "Bernice 從她肩膀後面讀完，點了點頭，這一次沒有開玩笑。"}, {"en": "They closed the empty Friday Box together and carried it back inside, ready for whatever the next school year would bring.", "zh": "他們一起把空的 Friday Box 蓋上，抬回教室裡，準備好迎接下一個學年會帶來的任何事。"}, {"en": "Whatever came next, Coco thought, one thing already felt certain: there would always be a next question worth asking.", "zh": "Coco 心想，不管接下來會發生什麼，有一件事已經很確定：永遠會有下一個值得問的問題。"}], "quiz": [{"question": "Why is the Friday Box empty on the last Friday of the year?", "options": ["Maybe everyone already said what they needed to say", "The box was removed", "Nobody used the box this year", "The box was broken"], "answer": 0}, {"question": "How many cases does Mr. Pan count for the year?", "options": ["Seven, or eight if the box itself counts as one", "Only two", "Twelve", "None at all"], "answer": 0}, {"question": "What does \"certain\" mean in the last sentence?", "options": ["確定的", "危險的", "免費的", "秘密的"], "answer": 0}, {"question": "What does Coco write on the last page of her notebook?", "options": ["That schools are full of quiet things people do for each other, and asking the right question helps you see them", "A list of every student's name", "A new mystery to solve next year", "The rules of the podcast club"], "answer": 0}]}]</script>
<script>
const EMBEDDED_CHAPTERS = JSON.parse(document.getElementById("chapters-data").textContent);
const TOTAL_CHAPTERS = 24; // 會自動偵測實際存在的章節，抓不到就停止
let chapters = [];
let current = 1;

function loadChapters() {
  chapters = EMBEDDED_CHAPTERS;
  buildNav();
  render(chapters[0].chapter);
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function wordVariants(entry) {
  const w = entry.word.toLowerCase();
  const forms = new Set([w, w + 's', w + 'es', w + 'ed', w + 'ing']);
  if (w.endsWith('e')) {
    forms.add(w.slice(0, -1) + 'ing');
    forms.add(w + 'd');
  }
  if (w.endsWith('y') && w.length > 1 && !'aeiou'.includes(w[w.length - 2])) {
    forms.add(w.slice(0, -1) + 'ies');
    forms.add(w.slice(0, -1) + 'ied');
  }
  ['pastForm', 'pastParticipleForm'].forEach(key => {
    if (entry[key]) {
      entry[key].split('/').forEach(f => forms.add(f.trim().toLowerCase()));
    }
  });
  return Array.from(forms).sort((a, b) => b.length - a.length);
}

function highlightSentence(text, words) {
  const matches = [];
  words.forEach(w => {
    for (const variant of wordVariants(w)) {
      const escaped = variant.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp(`\\b${escaped}\\b`, 'i');
      const m = re.exec(text);
      if (m) {
        matches.push({ start: m.index, end: m.index + m[0].length, cls: w.cls, zh: w.zh, word: w.word });
        break;
      }
    }
  });
  matches.sort((a, b) => a.start - b.start);
  const kept = [];
  let lastEnd = -1;
  matches.forEach(m => {
    if (m.start >= lastEnd) {
      kept.push(m);
      lastEnd = m.end;
    }
  });
  let result = '';
  let cursor = 0;
  kept.forEach(m => {
    result += escapeHtml(text.slice(cursor, m.start));
    const title = escapeHtml(`${m.word}：${m.zh}`);
    result += `<span class="${m.cls}" title="${title}">${escapeHtml(text.slice(m.start, m.end))}</span>`;
    cursor = m.end;
  });
  result += escapeHtml(text.slice(cursor));
  return result;
}

function buildNav() {
  const nav = document.getElementById('chapterNav');
  chapters.forEach(ch => {
    const btn = document.createElement('button');
    btn.textContent = `Ch${String(ch.chapter).padStart(2, '0')}. ${ch.title}`;
    btn.dataset.chapter = ch.chapter;
    btn.onclick = () => render(ch.chapter);
    nav.appendChild(btn);
  });
}

function render(chapterNum) {
  current = chapterNum;
  const ch = chapters.find(c => c.chapter === chapterNum);
  document.querySelectorAll('#chapterNav button').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.chapter) === chapterNum);
  });

  const content = document.getElementById('content');
  let html = `<h1>Chapter ${String(ch.chapter).padStart(2, '0')}. ${ch.title}</h1>`;
  const twCount = (ch.targetWords || []).length;
  const exCount = (ch.extraHighlightWords || []).length;
  html += `<div class="meta">Level ${ch.level} · ${ch.sentences.length} 句 · ${ch.quiz.length} 題測驗 · ${twCount} 個標色單字 · ${exCount} 個額外高頻詞</div>`;
  html += `<span class="toggle-zh" onclick="document.body.classList.toggle('hide-zh')">👁 切換中文顯示/隱藏</span>`;
  html += `<div class="legend"><span class="hl-target">藍色</span>Level 1/2 目標單字（滑鼠移上去看意思）<span class="hl-extra">紫色</span>額外高頻詞</div>`;

  // group targetWords/extraHighlightWords by which sentence they first appear in
  const wordsBySentence = {};
  (ch.targetWords || []).forEach(w => {
    const idx = w.firstOccurrenceSentenceIndex;
    if (idx == null || idx < 0) return;
    (wordsBySentence[idx] = wordsBySentence[idx] || []).push({ ...w, cls: 'hl-target' });
  });
  (ch.extraHighlightWords || []).forEach(w => {
    const idx = w.firstOccurrenceSentenceIndex;
    if (idx == null || idx < 0) return;
    (wordsBySentence[idx] = wordsBySentence[idx] || []).push({ ...w, cls: 'hl-extra' });
  });

  ch.sentences.forEach((s, i) => {
    const highlighted = highlightSentence(s.en, wordsBySentence[i] || []);
    html += `<div class="sentence"><span class="idx">${i + 1}.</span><span class="en">${highlighted}</span><div class="zh">${escapeHtml(s.zh)}</div></div>`;
  });

  html += `<h2 class="section">讀後測驗</h2>`;
  ch.quiz.forEach((q, qi) => {
    html += `<div class="quiz-item"><div class="q">${qi + 1}. ${q.question}</div>`;
    q.options.forEach((opt, oi) => {
      html += `<label id="q${qi}_o${oi}" onclick="answerQuiz(${qi}, ${oi}, ${q.answer})">
        <input type="radio" name="q${qi}" style="margin-right:8px;">${opt}
      </label>`;
    });
    html += `</div>`;
  });

  const prevBtn = chapterNum > 1 ? `<button onclick="render(${chapterNum - 1})">← 上一章</button>` : `<button disabled>← 上一章</button>`;
  const nextBtn = chapters.some(c => c.chapter === chapterNum + 1) ? `<button onclick="render(${chapterNum + 1})">下一章 →</button>` : `<button disabled>下一章 →</button>`;
  html += `<div class="nav-buttons">${prevBtn}${nextBtn}</div>`;
  html += `<div class="status">共偵測到 ${chapters.length} 章</div>`;

  content.innerHTML = html;
  window.scrollTo(0, 0);
}

function answerQuiz(qIndex, chosenIndex, correctIndex) {
  for (let i = 0; i < 10; i++) {
    const el = document.getElementById(`q${qIndex}_o${i}`);
    if (!el) break;
    el.classList.remove('correct', 'wrong');
  }
  const chosenEl = document.getElementById(`q${qIndex}_o${chosenIndex}`);
  const correctEl = document.getElementById(`q${qIndex}_o${correctIndex}`);
  if (chosenIndex === correctIndex) {
    chosenEl.classList.add('correct');
  } else {
    chosenEl.classList.add('wrong');
    correctEl.classList.add('correct');
  }
}

loadChapters();
</script>
</body>
</html>
