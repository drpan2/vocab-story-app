<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文單字故事 App — 快速預覽</title>
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #2b2b2b;
    --accent: #c0562b;
    --muted: #8a8a8a;
    --border: #e6ddd0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Noto Sans TC", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    min-height: 100vh;
  }
  nav {
    width: 220px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 16px 8px;
    overflow-y: auto;
  }
  nav h2 {
    font-size: 14px;
    color: var(--muted);
    padding: 0 8px;
    margin: 4px 0 10px;
  }
  nav button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 8px 10px;
    margin-bottom: 4px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--ink);
  }
  nav button:hover { background: #f2e9dd; }
  nav button.active { background: var(--accent); color: #fff; }
  main {
    flex: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .meta { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .sentence {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
  }
  .sentence .en { font-size: 17px; line-height: 1.6; }
  .sentence .zh { font-size: 14px; color: #555; margin-top: 6px; }
  .sentence .idx { color: var(--muted); font-size: 12px; margin-right: 6px; }
  h2.section { margin-top: 36px; font-size: 18px; border-bottom: 2px solid var(--accent); display: inline-block; padding-bottom: 2px; }
  .quiz-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 14px;
  }
  .quiz-item .q { font-weight: 600; margin-bottom: 8px; }
  .quiz-item label {
    display: block;
    padding: 6px 10px;
    margin-bottom: 4px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .quiz-item label:hover { background: #f7f1e8; }
  .quiz-item label.correct { background: #e4f3e4; border-color: #7ac47a; }
  .quiz-item label.wrong { background: #f8e2e2; border-color: #e28a8a; }
  .nav-buttons { display: flex; justify-content: space-between; margin-top: 32px; }
  .nav-buttons button {
    padding: 8px 16px;
    border: 1px solid var(--accent);
    background: #fff;
    color: var(--accent);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .nav-buttons button:hover { background: var(--accent); color: #fff; }
  .nav-buttons button:disabled { opacity: 0.35; cursor: default; }
  .status { color: var(--muted); font-size: 13px; margin-top: 8px; }
  .toggle-zh {
    font-size: 13px;
    color: var(--accent);
    cursor: pointer;
    user-select: none;
    margin-bottom: 16px;
    display: inline-block;
  }
  body.hide-zh .sentence .zh { display: none; }
  .hl-target {
    color: #1a5fb4;
    font-weight: 600;
    border-bottom: 2px solid #a8c9f0;
    cursor: help;
  }
  .hl-extra {
    color: #9a2fb0;
    font-weight: 600;
    border-bottom: 2px dashed #dbaee8;
    cursor: help;
  }
  .legend { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .legend span { margin-right: 14px; }
  .legend .hl-target, .legend .hl-extra { border-bottom: none; padding: 1px 4px; border-radius: 3px; background: #eef4fc; }
  .legend .hl-extra { background: #f8ecfa; }
</style>
</head>

netic": "", "level": 1, "firstOccurrenceSentenceIndex": 24, "pastForm": "outed", "pastParticipleForm": "outed"}, {"word": "watch", "pos": "v./n.", "zh": "手錶", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 24, "pastForm": "watched", "pastParticipleForm": "watched"}, {"word": "smile", "pos": "n./v.", "zh": "微笑", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25, "pastForm": "smiled", "pastParticipleForm": "smiled"}, {"word": "afternoon", "pos": "n.", "zh": "午安", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25}, {"word": "now", "pos": "adv./n.", "zh": "現在", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25, "pastForm": "nowed", "pastParticipleForm": "nowed"}, {"word": "night", "pos": "n.", "zh": "夜晚", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26}, {"word": "add", "pos": "v.", "zh": "添加", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "added", "pastParticipleForm": "added"}, {"word": "more", "pos": "adj./pron./adv.", "zh": "更多的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "mored", "pastParticipleForm": "mored"}, {"word": "under", "pos": "prep./adv.", "zh": "在下面", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "undered", "pastParticipleForm": "undered"}, {"word": "note", "pos": "n./v.", "zh": "筆記", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "noted", "pastParticipleForm": "noted"}, {"word": "whoever", "pos": "pron.", "zh": "誰", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 26}, {"word": "break", "pos": "n./v.", "zh": "休息", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "breaked", "pastParticipleForm": "breaked"}, {"word": "protect", "pos": "v.", "zh": "保護", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 26, "pastForm": "protected", "pastParticipleForm": "protected"}, {"word": "neither", "pos": "adj./adv./pron./conj.", "zh": "兩者都不", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 27, "pastForm": "neithered", "pastParticipleForm": "neithered"}, {"word": "yet", "pos": "adv./conj.", "zh": "然而", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 27, "pastForm": "yeted", "pastParticipleForm": "yeted"}, {"word": "right", "pos": "adv./adj./n.", "zh": "正確的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 27, "pastForm": "righted", "pastParticipleForm": "righted"}, {"word": "turn", "pos": "v./n.", "zh": "轉動", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 27, "pastForm": "turned", "pastParticipleForm": "turned"}], "extraHighlightWords": [{"word": "podcast", "pos": "n.", "zh": "Podcast；網路廣播節目", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 8, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "It was a bright, busy Monday morning, and Coco left her apartment on her bicycle ten minutes earlier than usual.", "zh": "那是一個晴朗又忙碌的星期一早晨，Coco 提早十分鐘騎腳踏車離開公寓。"}, {"en": "Her aunt had already made breakfast: warm rice, a boiled egg, and a cup of milk.", "zh": "她的阿姨已經做好了早餐：溫熱的白飯、一顆水煮蛋，還有一杯牛奶。"}, {"en": "\"Eat before you go,\" her aunt said. \"You look tired.\"", "zh": "阿姨說：「出門前先吃一點，你看起來很累。」"}, {"en": "Coco grabbed a piece of toast instead and promised she would eat the egg later.", "zh": "Coco 拿了一片吐司代替，答應她晚點會把蛋吃掉。"}, {"en": "The sky was clear and blue, with a few small clouds near the mountain behind the school.", "zh": "天空清澈湛藍，學校後方的山附近飄著幾朵小小的雲。"}, {"en": "She parked her bicycle by the gate and walked in, past the busy morning crowd of students.", "zh": "她把腳踏車停在門口，走進校園，經過一群忙碌的晨間人潮。"}, {"en": "Every student at their school knew one strange fact: the clock above the front gate was always ten minutes slow.", "zh": "學校裡每個學生都知道一件怪事：大門口的鐘，永遠慢十分鐘。"}, {"en": "It didn't matter how many times someone fixed it. By the next morning, it was slow again.", "zh": "不管修過多少次，隔天早上它又會變慢。"}, {"en": "Bernice had a new plan for their podcast. \"Let's stop asking easy questions,\" she said. \"Let's solve a real case.\"", "zh": "Bernice 對他們的 podcast 有個新計畫：「別再問那些簡單無聊的問題了，」她說：「我們來解一個真正的案子。」"}, {"en": "Coco looked up from her notebook. \"The clock? Everyone already knows about the clock.\"", "zh": "Coco 從筆記本上抬起頭來：「那個鐘？大家早就知道那個鐘的事了。」"}, {"en": "\"Exactly,\" Bernice said. \"Everyone knows about it, but nobody knows why.\"", "zh": "Bernice 說：「就是啊，大家都知道有這件事，但沒有人知道為什麼。」"}, {"en": "Mr. Pan agreed to let them try, but he gave them one clear rule first.", "zh": "潘老師同意讓他們試試看，但先給了他們一條清楚的規則。"}, {"en": "\"A good case doesn't start with a guess,\" he said. \"It starts with checking what's actually true.\"", "zh": "他說：「一個好的案子不是從猜測開始，而是從查證什麼是真的開始。」"}, {"en": "So instead of asking why the clock was slow, they asked a smaller question first: how slow, exactly, and when?", "zh": "所以他們沒有先問「鐘為什麼慢」，而是先問一個更小的問題：到底慢多少？什麼時候開始慢的？"}, {"en": "Every morning for a week, Coco checked the clock at exactly eight o'clock and wrote down the time it showed.", "zh": "接下來一整個星期，Coco 每天早上八點整都去看那個鐘，把它顯示的時間記下來。"}, {"en": "The answer was always the same: ten minutes slow. Not nine, not eleven. Always exactly ten.", "zh": "答案永遠一樣：慢十分鐘，不是九分鐘，也不是十一分鐘，永遠剛好十分鐘。"}, {"en": "\"That's strange,\" Coco said. \"A broken clock is usually messy. This one is too regular.\"", "zh": "Coco 說：「這很奇怪，一個壞掉的鐘通常是亂的，但這個太規律了。」"}, {"en": "Bernice's eyes lit up. \"So maybe it's not broken. Maybe someone is doing this on purpose.\"", "zh": "Bernice 眼睛一亮：「所以搞不好它根本沒壞，是有人故意這樣做的。」"}, {"en": "They found the school worker who repairs the clock, a quiet man named Mr. Tan.", "zh": "他們找到負責修鐘的學校工友，一位安靜的男士，叫做陳先生。"}, {"en": "\"I fix it every month,\" Mr. Tan said. \"Every time, it's perfect when I leave.\"", "zh": "陳先生說：「我每個月都會修一次，每次修完離開的時候，它都是準的。」"}, {"en": "\"Then how does it get slow again?\" Bernice asked.", "zh": "Bernice 問：「那它是怎麼又變慢的？」"}, {"en": "Mr. Tan shook his head. \"I don't know. I only know the schedule doesn't match what I see.\"", "zh": "陳先生搖搖頭：「我不知道，我只知道排程跟我看到的對不起來。」"}, {"en": "Coco wrote one line in her notebook: fixed and correct on day one, slow again by day two.", "zh": "Coco 在筆記本上寫下一行字：第一天修好是準的，第二天就又慢了。"}, {"en": "\"Someone is changing it back,\" she said quietly. \"But why would anyone want the clock to be slow?\"", "zh": "她小聲說：「有人把它調回去了，但為什麼會有人希望這個鐘是慢的？」"}, {"en": "Bernice picked up her bag. \"There's one way to find out. We watch it.\"", "zh": "Bernice 拿起書包：「只有一個辦法知道答案，我們來盯著它看。」"}, {"en": "Mr. Pan smiled for the first time that afternoon. \"Now that,\" he said, \"is a real question.\"", "zh": "潘老師那天下午第一次露出笑容：「這個，」他說：「才是一個真正的問題。」"}, {"en": "That night, Coco added one more line under her notes: whoever is doing this is not trying to break the clock. They are protecting the ten minutes.", "zh": "那天晚上，Coco 在筆記下面又加了一行：不管是誰在做這件事，他要的不是弄壞鐘，而是要守住那十分鐘。"}, {"en": "Neither of them knew yet how right that guess would turn out to be.", "zh": "他們兩個都還不知道，這個猜測後來會有多準。"}], "quiz": [{"question": "What is strange about the clock?", "options": ["It's always exactly ten minutes slow.", "It's always ten minutes fast.", "It never shows the right day.", "It rings every hour."], "answer": 0}, {"question": "What rule does Mr. Pan give them first?", "options": ["Check what's actually true before guessing.", "Never ask questions.", "Always trust the first answer.", "Record everything on video."], "answer": 0}, {"question": "What does \"regular\" mean?", "options": ["規律的", "危險的", "便宜的", "吵鬧的"], "answer": 0}, {"question": "What does Coco guess at the end of the chapter?", "options": ["Someone is protecting the ten minutes, not just breaking the clock.", "The clock is completely broken.", "Mr. Tan is lying.", "The school will remove the clock."], "answer": 0}]}, {"level": 1, "chapter": 2, "title": "The Watch at the Gate", "targetWords": [{"word": "night", "pos": "n.", "zh": "夜晚", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "before", "pos": "prep./conj./adv.", "zh": "前", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm" omeone touched the clock every night or every morning, they just had to be there when it happened.", "zh": "Bernice 的計畫很簡單：如果有人每天晚上或早上都會動那個鐘，他們只要在那個時候到場就行了。"}, {"en": "\"We come before the gate opens,\" she said. \"Before anyone else is here.\"", "zh": "她說：「我們要在校門開之前就到，趕在其他人之前。」"}, {"en": "Coco was not sure this was a good idea. \"That means getting up in the dark,\" she said.", "zh": "Coco 不太確定這是個好主意：「那表示我們要摸黑起床。」"}, {"en": "\"Real cases don't happen at a convenient time,\" Bernice said, and that was the end of the argument.", "zh": "Bernice 說：「真正的案子才不會挑方便的時間發生。」這句話讓 Coco 沒話說了。"}, {"en": "The next morning, both of them arrived while the sky was still gray and the street was almost empty.", "zh": "隔天早上，兩個人到的時候，天空還是灰灰的，街上幾乎沒有人。"}, {"en": "They stood near the wall, close enough to see the clock but far enough not to be noticed.", "zh": "他們站在牆邊，近到能看清楚那個鐘，又遠到不容易被發現。"}, {"en": "For almost twenty minutes, nothing happened. Coco started to think the whole plan was a waste of time.", "zh": "將近二十分鐘，什麼事都沒發生，Coco 開始覺得這整個計畫是在浪費時間。"}, {"en": "Then, at exactly seven twenty, a figure walked slowly toward the gate.", "zh": "接著，剛好七點二十分，一個人影慢慢走向大門。"}, {"en": "The person carried a small bag and moved like someone who had done this many times before.", "zh": "那個人拿著一個小袋子，動作看起來像是已經做過很多次了。"}, {"en": "Bernice took Coco's arm without saying a word.", "zh": "Bernice 一句話也沒說，抓住了 Coco 的手臂。"}, {"en": "The figure took out a small key and opened a thin door under the clock that most students never noticed.", "zh": "那個人拿出一把小鑰匙，打開了鐘下面一道大部分學生都沒注意過的小門。"}, {"en": "From where they stood, they could hear a quiet click, like something being turned.", "zh": "從他們站的地方，可以聽到一聲輕輕的喀答聲，像是有什麼東西被轉動了。"}, {"en": "Coco moved forward without thinking, and her shoe hit a small stone.", "zh": "Coco 不小心往前移動，鞋子踢到了一顆小石頭。"}, {"en": "The sound was small, but the figure turned around fast.", "zh": "聲音很小，但那個人很快就轉過頭來。"}, {"en": "For one second, Coco and the stranger looked straight at each other.", "zh": "有那麼一秒鐘，Coco 和那個陌生人直直看著彼此。"}, {"en": "Then the person closed the little door, picked up the bag, and walked away fast, without a single word.", "zh": "接著那個人關上小門，拿起袋子，一句話也沒說，快步走開了。"}, {"en": "Bernice ran to the clock, but the street was already empty.", "zh": "Bernice 跑向那個鐘，但街上已經空無一人。"}, {"en": "On the ground, half hidden under a leaf, was something the person had dropped: an old key, much older than any key at their school.", "zh": "地上，半藏在一片葉子底下，有一樣那個人掉下來的東西：一把舊鑰匙，看起來比學校裡任何一把鑰匙都還要舊。"}, {"en": "Coco picked it up carefully and turned it over in her hand.", "zh": "Coco 小心翼翼地把它撿起來，在手裡翻來翻去看。"}, {"en": "\"This key is older than us,\" she said. \"Whoever this is, they've been doing this for a very long time.\"", "zh": "她說：「這把鑰匙比我們的年紀還大，不管是誰，他做這件事已經很久了。」"}, {"en": "Bernice looked at the small door under the clock, still slightly open. \"Then it's not a joke,\" she said quietly. \"It's a habit.\"", "zh": "Bernice 看著那扇還微微開著的小門說：「那這就不是惡作劇，」她小聲說：「是一個習慣。」"}, {"en": "They decided not to tell anyone yet, not even Mr. Pan, until they understood what the key really opened.", "zh": "他們決定先不告訴任何人，連潘老師都先不說，直到弄清楚這把鑰匙到底開的是什麼。"}, {"en": "Before leaving, Coco checked a short list on her phone: jacket, bottle of water, notebook, and her house key.", "zh": "出門前，Coco 在手機上檢查一份短短的清單：外套、水瓶、筆記本，還有家裡鑰匙。"}, {"en": "She almost forgot her cellphone charger, which would have been a real problem later that morning.", "zh": "她差點忘了帶手機充電器，那天早上稍晚這可能會是個大麻煩。"}], "quiz": [{"question": "What do Coco and Bernice do to catch whoever touches the clock?", "options": ["They watch the gate before school opens.", "They ask the principal.", "They install a camera.", "They ask their classmates to guess."], "answer": 0}, {"question": "What does the figure use to open the small door under the clock?", "options": ["An old key", "A password", "A hammer", "A phone"], "answer": 0}, {"question": "What does \"stranger\" mean?", "options": ["陌生人", "老師", "朋友", "工友"], "answer": 0}, {"question": "What do Coco and Bernice decide at the end of the chapter?" 4, "pastForm": "enoughed", "pastParticipleForm": "enoughed"}, {"word": "love", "pos": "n./v.", "zh": "愛", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 34, "pastForm": "loved", "pastParticipleForm": "loved"}, {"word": "more", "pos": "adj./pron./adv.", "zh": "更多的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 34, "pastForm": "mored", "pastParticipleForm": "mored"}], "extraHighlightWords": [{"word": "hallway", "pos": "n.", "zh": "（室內）走廊", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 8, "highlightType": "extra-high-frequency"}, {"word": "podcast", "pos": "n.", "zh": "Podcast；網路廣播節目", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 25, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "That week, their art class was studying the school's history for a small project.", "zh": "那個星期，他們的美術課正在為一個小報告研究學校的歷史。"}, {"en": "The teacher had brought out an old box from the museum room downstairs, full of photographs and letters.", "zh": "老師從樓下的博物館室搬出一個舊箱子，裡面裝滿了照片和信件。"}, {"en": "\"My grandmother went to a school just like this one,\" Bernice said, looking through the pictures.", "zh": "Bernice 一邊翻看照片一邊說：「我奶奶以前念的學校跟這裡很像。」"}, {"en": "Coco's grandfather, on the other hand, had never finished middle school at all.", "zh": "Coco 的爺爺則完全沒有唸完國中。"}, {"en": "\"Everyone's family has a different history,\" Coco said quietly.", "zh": "Coco 小聲說：「每個人的家庭都有不同的歷史。」"}, {"en": "Coco couldn't stop thinking about the face she had seen for one second at the gate.", "zh": "Coco 一直忘不了她在校門口那一秒鐘看到的那張臉。"}, {"en": "It was an older woman, with white hair and a long gray coat.", "zh": "那是一位年紀較大的女士，有一頭白髮，穿著一件長長的灰色外套。"}, {"en": "\"I've seen her somewhere before,\" Coco said. \"But I can't remember where.\"", "zh": "Coco 說：「我在哪裡見過她，但我想不起來是哪裡。」"}, {"en": "The answer came two days later, in the school hallway, in front of a wall of old pictures.", "zh": "兩天後，答案出現在學校走廊上，一面掛滿舊照片的牆前面。"}, {"en": "Coco stopped walking so suddenly that Bernice walked straight into her.", "zh": "Coco 突然停下腳步，Bernice 直接撞了上去。"}, {"en": "\"That's her,\" Coco whispered, pointing at a small black-and-white picture.", "zh": "Coco 小聲說：「就是她。」手指著一張黑白小照片。"}, {"en": "Under the picture was a short line of words: Ms. Ho, English Teacher and Sunrise Club Leader.", "zh": "照片下面有一行小字：何老師，英文老師，晨光社指導老師。"}, {"en": "Neither of them had ever heard of a club called Sunrise Club.", "zh": "他們兩個都沒聽過什麼叫做「晨光社」的社團。"}, {"en": "Mr. Pan knew the name, though. \"That club stopped meeting a long time ago,\" he said. \"Before I started teaching here.\"", "zh": "不過潘老師知道這個名字：「那個社團很久以前就停止聚會了，」他說：「在我來這裡教書之前。」"}, {"en": "The next morning, instead of hiding, Coco and Bernice waited by the gate in plain sight.", "zh": "隔天早上，Coco 和 Bernice 沒有再躲起來，而是大大方方地在校門口等。"}, {"en": "When Ms. Ho arrived at seven twenty, she saw them right away.", "zh": "何老師七點二十分到的時候，馬上就看到了他們。"}, {"en": "For a moment, nobody said anything.", "zh": "有那麼一刻，誰都沒有開口。"}, {"en": "\"We're not trying to get you in trouble,\" Coco said quickly. \"We just want to understand.\"", "zh": "Coco 很快地說：「我們不是想害你惹上麻煩，我們只是想弄清楚。」"}, {"en": "Ms. Ho looked at the clock, then at them, and finally decided to explain.", "zh": "何老師看了看鐘，又看了看他們，最後決定解釋。"}, {"en": "\"Years ago, my club met here every morning at seven twenty, ten minutes before the bell,\" she said.", "zh": "她說：「好幾年前，我的社團每天早上七點二十分都在這裡集合，比鐘聲早十分鐘。」"}, {"en": "\"Those ten quiet minutes were the best part of the whole school day for some of my students.\"", "zh": "「那十分鐘安靜的時光，對我一些學生來說，是一整天學校生活裡最好的一段時間。」"}, {"en": "\"The club ended when the students grew up and left. But I never forgot that habit.\"", "zh": "「後來學生長大離開，社團就結束了，但我一直沒忘記那個習慣。」"}, {"en": "\"So every month, after the clock gets fixed, I turn it back myself,\" she said. \"Just ten minutes. Just for whoever needs a little quiet before the day starts.\"", "zh": "她說：「所以每個月鐘修好之後，我都會自己把它調回去，就十分鐘而已，留給任何在一天開始前需要一點安靜的人。」"}, {"en": "Bernice looked at Coco. \"So it really wasn't about breaking anything,\" she said.", "zh": "Bernice 看著 Coco 說：「所以這根本不是要弄壞什麼東西。」"}, {"en": "\"It was about keeping something,\" Coco finished. \"Even after everyone else forgot it existed.\"", "zh": "Coco 接著說：「而是要留住某個東西，就算大家都已經忘記它曾經存在過。」"}, {"en": "They promised Ms. Ho they would keep her secret, and for their podcast, they only shared the ten quiet minutes, not her name.", "zh": "他們向何老師保證會保守這個秘密，節目裡他們只分享了那十分鐘的故事，沒有說出她的名字。"}, {"en": "That evening, a new note appeared in the Friday Box, and it was about something even stranger than a slow clock: a light in the old library that turned on by itself, always at the exact same time.", "zh": "那天傍晚，Friday Box 裡出現一張新紙條，講的是一件比鐘慢十分鐘更奇怪的事：舊圖書館裡有一盞燈會自己亮起來，而且每次都是同一個時間。"}, {"en": "That evening, Coco's grandfather brought out an old photo album he hadn't opened in years.", "zh": "那天晚上，Coco 的爺爺拿出一本好幾年沒打開過的舊相簿。"}, {"en": "In one photo, he was catching a small fish by a bridge near his childhood home.", "zh": "有一張照片，他正在老家附近的一座橋邊抓一條小魚。"}, {"en": "\"That was the year I moved abroad for work,\" he said, pointing at a photo taken outside an airport.", "zh": "他指著一張在機場外拍的照片說：「那是我出國工作的那一年。」"}, {"en": "In another, a much younger version of him was kicking a ball across a field with his brother.", "zh": "另一張照片裡，年輕許多的他正跟哥哥在一片空地上踢球。"}, {"en": "\"We used to invite the whole street over to celebrate the new year,\" he said, laughing at a blurry group photo.", "zh": "他看著一張模糊的合照笑著說：「我們以前會邀請整條街的人一起過新年。」"}, {"en": "One old photo showed him standing proudly by a hotel near the sea, on the only trip abroad he ever took.", "zh": "有一張舊照片，是他驕傲地站在海邊一間旅館旁，那是他這輩子唯一一次出國旅行。"}, {"en": "\"I never learned to drive,\" he admitted, \"so your grandmother did all the driving on that trip.\"", "zh": "他坦承：「我從來沒學會開車，所以那趟旅行都是你奶奶在開車。」"}, {"en": "Coco asked why he never went abroad again. \"Once was enough to know I loved home more,\" he said.", "zh": "Coco 問他為什麼沒有再出國過。他說：「一次就夠讓我知道，我更愛家裡。」"}], "quiz": [{"question": "Who is the woman at the gate?", "options": ["Ms. Ho, a former teacher and club leader", "The new : "", "level": 1, "firstOccurrenceSentenceIndex": 31, "pastForm": "started", "pastParticipleForm": "started"}, {"word": "think", "pos": "v.", "zh": "思考", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 31, "pastForm": "thought", "pastParticipleForm": "thought"}, {"word": "it (its, itself)", "pos": "pron.", "zh": "它（它的，它本身）", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 31}, {"word": "own", "pos": "adj./pron./v.", "zh": "自己的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 31, "pastForm": "owned", "pastParticipleForm": "owned"}], "extraHighlightWords": [{"word": "timer", "pos": "n.", "zh": "計時器", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 26, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "Earlier that term, the whole grade had taken a class trip by bus, since the school couldn't afford an airplane ticket for everyone.", "zh": "那個學期稍早，整個年級搭巴士去校外教學，畢竟學校沒辦法幫每個人買機票。"}, {"en": "On the way, their bus got stuck in heavy traffic behind a truck carrying bags of sugar and salt.", "zh": "路上，他們的巴士被一輛載滿糖袋和鹽袋的卡車堵在車陣裡動彈不得。"}, {"en": "At a rest stop near the coast, some students bought ice cream while others fed the local birds by a small pond.", "zh": "在靠海邊的休息站，有些學生買了冰淇淋，有些人在一個小池塘邊餵鳥。"}, {"en": "They finally reached a large open field, where a farmer showed them a horse, a pig, and a hen with new chicks.", "zh": "他們終於到了一片開闊的田野，一位農夫給他們看一匹馬、一頭豬，還有一隻帶著小雞的母雞。"}, {"en": "For lunch, the class ate outside under a wide tree, sharing carrots, boiled eggs, and slices of watermelon.", "zh": "午餐時，全班在一棵大樹下吃飯，分享著紅蘿蔔、水煮蛋，還有幾片西瓜。"}, {"en": "The sky stayed clear and blue all day, though a thin rainbow appeared briefly after a short shower near sunset.", "zh": "天空整天都很晴朗湛藍，只有接近日落時，一場短暫的陣雨後出現了一道淡淡的彩虹。"}, {"en": "On the ride home, half the bus fell asleep, tired but happy after a long day outside the classroom.", "zh": "回程的路上，半台巴士的人都睡著了，在教室外度過漫長一天後，又累又開心。"}, {"en": "In the school office, an old computer sat next to a stack of newspapers nobody had thrown away.", "zh": "學校辦公室裡，一台舊電腦旁邊堆著一疊沒人丟掉的舊報紙。"}, {"en": "Coco borrowed a ruler, an eraser, and a pencil to sketch a quick map of the old library room.", "zh": "Coco 借了一把尺、一個橡皮擦，還有一支鉛筆，快速畫了一張舊圖書館房間的地圖。"}, {"en": "\"There has to be a paper record somewhere,\" she said, checking every drawer for a stray letter or an old envelope.", "zh": "她說：「一定有紙本紀錄放在某個地方。」一邊檢查每個抽屜，找有沒有被遺漏的信件或舊信封。"}, {"en": "The new note was short: \"The light in the old library turns on every night. Always at the same time. Nobody is there.\"", "zh": "那張新紙條很短：「舊圖書館的燈每天晚上都會亮，永遠是同一個時間，而且裡面沒有人。」"}, {"en": "Bernice read it twice. \"A clock that lies is one thing. A light with no one to turn it on is another.\"", "zh": "Bernice 讀了兩遍：「一個報錯時間的鐘是一回事，一盞沒有人開卻會亮的燈，又是另一回事。」"}, {"en": "The old library was a small room at the end of the second floor, used mostly to store boxes of donated books.", "zh": "舊圖書館是二樓走道盡頭的一個小房間，大部分時間只拿來堆放捐贈書箱。"}, {"en": "Almost nobody went in there anymore, which made the story easy to believe and hard to check.", "zh": "幾乎沒有人再進去那裡，這讓這個故事既容易相信，又很難查證。"}, {"en": "\"We can't stay at school until night,\" Coco said. \"We need someone who's already here when it happens.\"", "zh": "Coco 說：「我們沒辦法待在學校待到晚上，我們需要一個那個時間已經在學校的人。」"}, {"en": "That someone turned out to be Mr. Huang, the night guard who checked every building each night.", "zh": "那個人是黃先生，每天晚上都會巡邏每一棟大樓的警衛。"}, {"en": "\"That light?\" Mr. Huang said. \"Nine fifteen, every night. I could set my watch by it.\"", "zh": "黃先生說：「那盞燈？每天晚上九點十五分，分秒不差，我可以拿它來對錶。」"}, {"en": "\"Have you ever seen anyone go in before it turns on?\" Bernice asked.", "zh": "Bernice 問：「你有沒有看過有人在燈亮之前走進去過？」"}, {"en": "Mr. Huang shook his head. \"Never. The door is always closed, and only I have the key,\" he said. \"I check it myself.\"", "zh": "黃先生搖搖頭：「從來沒有，那扇門一直都是關著的，只有我有鑰匙，」他說：「我自己會去檢查。」"}, {"en": "That made the case stranger, not simpler: a closed room, with no one inside, where a light turned itself on every single night.", "zh": "這讓案子變得更奇怪，而不是更簡單：一間關著的房間，裡面沒有人，卻每天晚上都會自己亮燈。"}, {"en": "Mr. Pan said his rule again. \"Don't look for a ghost,\" he said. \"Look for a switch.\"", "zh": "潘老師又把那條規則說了一次：「不要去找鬼，」他說：「去找開關。」"}, {"en": "Because the guard agreed, they got to look inside the old library during lunch the next day.", "zh": "因為警衛答應了，他們隔天午餐時間得以進到舊圖書館裡面看看。"}, {"en": "The room smelled like old paper, and the boxes looked old and dirty.", "zh": "房間裡有股舊紙的味道，箱子看起來又舊又髒。"}, {"en": "Coco checked the light switch on the wall. It looked completely normal.", "zh": "Coco 檢查了牆上的燈開關，看起來完全正常。"}, {"en": "Bernice, however, found something behind an old bookshelf: a small box connected to the light with a thin wire.", "zh": "不過 Bernice 在一個舊書架後面發現了東西：一個用細線接著那盞燈的小盒子。"}, {"en": "It had a round dial with numbers on it, like a small clock built just for one job.", "zh": "上面有一個標著數字的圓形轉盤，像是一個專門為一件工作打造的小鐘。"}, {"en": "\"This isn't magic,\" Coco said, touching the dial carefully. \"This is a timer.\"", "zh": "Coco 小心地摸著那個轉盤說：「這不是魔法，這是一個計時器。」"}, {"en": "\"Someone built this to turn the light on at exactly nine fifteen, every night, on purpose,\" Bernice said.", "zh": "Bernice 說：「有人特地做了這個，讓燈每天晚上九點十五分準時亮起來。」"}, {"en": "But the timer looked old, older than anything else in the room except the boxes of books.", "zh": "但這個計時器看起來很舊，舊到除了那些書箱以外，比房間裡任何東西都還要老。"}, {"en": "\"Whoever built this,\" Coco said slowly, \"might not even work at this school anymore.\"", "zh": "Coco 慢慢地說：「不管是誰做的這個東西，他現在可能根本已經不在這間學校工作了。」"}, {"en": "Bernice looked at the timer, then at the old boxes around them. \"Then who has been coming in to wind it, all these years?\"", "zh": "Bernice 看著計時器，又看看四周的舊箱子：「那這麼多年來，是誰一直進來替它上發條？」"}, {"en": "Neither of them had an answer yet, but for the first time, Coco started to think the timer had been running on its own the whole time, with no one coming in at all.", "zh": "他們兩個暫時都答不出來，但 Coco 第一次開始覺得，這個計時器這些年來可能一直都是自己在運作，根本沒有人進來過。"}], "quiz": [{"question": "What is strange about the light in the old library?", "options": ["It turns on by itself every night, at the exact same time", "It never turns on at all", "It changes color", "It only turns on during class time"], "answer": 0}, {"question": "What rule does Mr. Pan repeat?", "options": ["Don't look for a ghost. Look for a switch.", "Always guess first.", "Never ask the night guard.", "Only investigate during the day."], "answer": 0}, {"question": "What does \"believe\" mean?", "options": ["相信", "忘記", "拒絕", "討厭"], "answer": 0}, {"question": "What do Bernice and Coco find behind the old bookshelf?", "options": ["A small timer connected to the light", "A hidden door", "A pile of money", "An old photograph"], "answer": 0}]}, {"level": 1, "chapter": 5, "title": "The Room That Used to Stay Open", "targetWords": [{"word": "office", "pos": "n.", "zh": "辦公室", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "secretary", "pos": "n.", "zh": "秘書", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "every", "pos": "adj.", "zh": "每一個", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "old", "pos": "adj.", "zh": "老的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "letter", "pos": "n.", "zh": "信", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "careful", "pos": "adj.", "zh": "小心", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "order", "pos": "n./v.", "zh": "命令", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "ordered", "pastParticipleForm": "ordered"}, {"word": "year", "pos": "n.", "zh": "年", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "price", "pos": "n./v.", "zh": "價格", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "priced", "pastParticipleForm": "priced"}, {"word": "like", "pos": "prep./v./n.", "zh": "喜歡", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "liked", "pastParticipleForm": "liked"}, {"word v.", "zh": "問題", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 24, "pastForm": "questioned", "pastParticipleForm": "questioned"}, {"word": "hate", "pos": "v./n.", "zh": "恨", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25, "pastForm": "hated", "pastParticipleForm": "hated"}, {"word": "learn", "pos": "v.", "zh": "學習", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25, "pastForm": "learned", "pastParticipleForm": "learned"}, {"word": "enjoy(ment)", "pos": "v./(n.)", "zh": "享受）", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25, "pastForm": "enjoyed", "pastParticipleForm": "enjoyed"}, {"word": "quiet", "pos": "adj./n./v.", "zh": "安靜的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25, "pastForm": "quieted", "pastParticipleForm": "quieted"}, {"word": "part", "pos": "n./v.", "zh": "部分", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25, "pastForm": "parted", "pastParticipleForm": "parted"}], "extraHighlightWords": [{"word": "timer", "pos": "n.", "zh": "計時器", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 11, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "The office secretary kept every old letter in careful order, by year and by price of postage, she liked to joke.", "zh": "辦公室秘書把每一封舊信都按照年份仔細分類，她開玩笑說連郵資的價格都有記錄。"}, {"en": "\"People don't send much mail anymore,\" she said, \"but the school kept every package and every order form.\"", "zh": "她說：「現在很少人寄信了，但學校還是留著每一個包裹和訂購單。」"}, {"en": "Mr. Tan, who still came by to fix the school clock every month, was the first person they asked about the old library.", "zh": "每個月還是會來修學校鐘的陳先生，是他們第一個問起舊圖書館的人。"}, {"en": "\"Wires and clocks, that's my job,\" he said. \"But that room has been closed since before I started working here.\"", "zh": "他說：「電線跟鐘，那是我的工作，但那個房間在我來這裡工作之前就關了。」"}, {"en": "He did remember one thing, though: an old sign that used to hang outside the door.", "zh": "不過他還記得一件事：門外曾經掛過一塊舊招牌。"}, {"en": "\"It said something about staying open in the evening,\" he said. \"I never really understood it.\"", "zh": "他說：「上面寫著晚上開放之類的話，我一直不太懂那是什麼意思。」"}, {"en": "That was enough for Coco to try the school office, where old records were kept on tall gray shelves.", "zh": "這對 Coco 來說已經足夠讓她去試試學校辦公室，那裡的舊紀錄都收在高高的灰色架子上。"}, {"en": "The office secretary was surprised anyone still remembered the room at all.", "zh": "辦公室的秘書很驚訝居然還有人記得那個房間。"}, {"en": "\"That was the Evening Study Hall,\" she said, pulling out a few old papers. \"For students who had jobs after school.\"", "zh": "她說：「那是晚間自習室。」一邊抽出幾張舊紙：「給放學後要打工的學生用的。」"}, {"en": "Years ago, some students could only study after their evening jobs ended, sometimes as late as nine o'clock.", "zh": "好幾年前，有些學生只能等傍晚打工結束後才能唸書，有時候要等到晚上九點。"}, {"en": "The school kept the old library open late for them, with one small light left on so the room never felt completely dark.", "zh": "學校特地讓那間舊圖書館晚一點才關，留一盞小燈，讓房間不至於完全黑暗。"}, {"en": "\"The timer was installed so the light would turn on by itself,\" the secretary explained. \"In case a teacher forgot, or left early.\"", "zh": "秘書解釋：「裝那個計時器，是為了讓燈能自己亮起來，免得老師忘記，或提早離開。」"}, {"en": "Bernice leaned closer. \"So nine fifteen wasn't random.\"", "zh": "Bernice 靠近了一點：「所以九點十五分不是隨便選的。」"}, {"en": "\"No,\" the secretary said. \"That was closing time. Fifteen minutes after the last student usually finished.\"", "zh": "秘書說：「不是，那就是關門時間，通常在最後一個學生唸完書後十五分鐘。」"}, {"en": "Coco asked when the program ended.", "zh": "Coco 問這個計畫是什麼時候結束的。"}, {"en": "\"About twelve years ago,\" the secretary said. \"Fewer students needed it. The room became a room for boxes instead.\"", "zh": "秘書說：「大概十二年前，需要的學生越來越少，這個房間就變成了放箱子的房間。」"}, {"en": "\"But somebody forgot to remove the timer,\" Coco said slowly.", "zh": "Coco 慢慢地說：「但有人忘了把那個計時器拆掉。」"}, {"en": "The secretary looked through the papers one more time. \"There's a name here, for whoever set the room up in the first place.\"", "zh": "秘書又翻了一次那些紙：「這裡有個名字，是最一開始設置這個房間的人。」"}, {"en": "She turned the papers around so they could read it: Mr. Yang, Night Worker.", "zh": "她把那些紙轉過來給他們看：楊先生，夜間工友。"}, {"en": "\"Is he still around?\" Bernice asked, already reaching for her notebook.", "zh": "Bernice 問：「他現在還在嗎？」已經伸手去拿她的筆記本。"}, {"en": "The secretary's face changed just slightly. \"Mr. Yang passed away eight years ago,\" she said quietly.", "zh": "秘書的表情微微變了：「楊先生八年前就過世了。」她小聲說。"}, {"en": "For a moment, neither Coco nor Bernice knew what to say.", "zh": "有那麼一刻，Coco 和 Bernice 都不知道該說什麼。"}, {"en": "\"So the timer has been doing his job,\" Coco said finally, \"for eight years, all by itself, with nobody asking it to.\"", "zh": "Coco 最後說：「所以這八年來，這個計時器一直在做他的工作，完全靠自己，沒有人叫它做。」"}, {"en": "Bernice looked back toward the old library, and for once, she had nothing funny to say.", "zh": "Bernice 回頭看向舊圖書館的方向，這一次，她一句好笑的話都說不出來。"}, {"en": "The secretary said her job was mostly simple actions repeated all day: collect the mail, copy a few pages, and answer the same questions.", "zh": "秘書說她的工作大部分是一整天重複的簡單動作：收信、影印幾頁文件，還有回答一樣的問題。"}, {"en": "\"I used to hate this job,\" she admitted, \"but I've learned to enjoy the quiet parts of it.\"", "zh": "她坦承：「我以前很討厭這份工作，但後來學會享受它安靜的那一面。」"}], "quiz": [{"question": "What was the old library used for years ago?", "options": ["An Evening Study Hall for students with after-school jobs", "A gym for the sports teams", "A place to sell food", "A room for sleeping"], "answer": 0}, {"question": "Why was the timer originally installed?", "options": ["So the light would turn on even if a teacher forgot or left early", "To wake up sleeping students", "To scare away animals", "To save money on electricity"], "answer": 0}, {"question": "What does \"remove\" mean?", "options": ["移除", "增加", "修理", "購買"], "answer": 0}, {"question": "What do Coco and Bernice learn about Mr. Yang?", "options": ["He passed away eight years ago.", "He still works at the school.", "He moved to another city.", "He became a teacher."], "answer": 0}]}, {"level": 1, "chapter": 6, "title": "A Story Worth Keeping", "targetW tled", "pastParticipleForm": "littled"}, {"word": "into", "pos": "prep.", "zh": "進入", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 24}, {"word": "start", "pos": "v./n.", "zh": "開始", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 24, "pastForm": "started", "pastParticipleForm": "started"}, {"word": "trust", "pos": "v./n.", "zh": "相信", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 24, "pastForm": "trusted", "pastParticipleForm": "trusted"}, {"word": "mention", "pos": "v./n.", "zh": "提到", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 25, "pastForm": "mentioned", "pastParticipleForm": "mentioned"}, {"word": "used", "pos": "adj.", "zh": "用過的", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 25}, {"word": "hot", "pos": "adj.", "zh": "熱的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25}, {"word": "tea", "pos": "n.", "zh": "茶", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25}, {"word": "cookie", "pos": "n.", "zh": "餅乾", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25}, {"word": "during", "pos": "prep.", "zh": "期間", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 25}, {"word": "knife", "pos": "n./v.", "zh": "刀", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "knifed", "pastParticipleForm": "knifed"}, {"word": "tape", "pos": "n.", "zh": "磁帶", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26}, {"word": "part", "pos": "n./v.", "zh": "部分", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "parted", "pastParticipleForm": "parted"}, {"word": "patient", "pos": "n./adj.", "zh": "病人", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 26}, {"word": "repair", "pos": "n./v.", "zh": "維修", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 26, "pastForm": "repaired", "pastParticipleForm": "repaired"}], "extraHighlightWords": [{"word": "mystery", "pos": "n.", "zh": "謎團；懸疑的事", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 9, "highlightType": "extra-high-frequency"}, {"word": "episode", "pos": "n.", "zh": "一集；事件", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 10, "highlightType": "extra-high-frequency"}, {"word": "timer", "pos": "n.", "zh": "計時器", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 16, "highlightType": "extra-high-frequency"}, {"word": "vending machine", "pos": "n.", "zh": "自動販賣機", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 21, "highlightType": "extra-high-frequency"}, {"word": "podcast", "pos": "n.", "zh": "Podcast；網路廣播節目", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 24, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "Mr. Yang's old file included a photograph of him standing proudly by the library door.", "zh": "楊先生的舊資料裡有一張他驕傲地站在圖書館門口的照片。"}, {"en": "\"He looked honest and kind,\" Coco said, \"even in an old black-and-white picture.\"", "zh": "Coco 說：「就算是舊的黑白照片，他看起來也很誠實善良。」"}, {"en": "She felt a small ache in her heart, thinking about how deeply someone could care without ever being thanked.", "zh": "她心裡有一點酸酸的感覺，想到一個人可以這麼深地在乎，卻從來沒有被好好感謝過。"}, {"en": "That night, Coco couldn't stop thinking about a small metal box working alone in a closed, forgotten room.", "zh": "那天晚上，Coco 一直忘不了那個獨自在一間關著、被遺忘的房間裡運作的小金屬盒子。"}, {"en": "\"We can't just leave it like this,\" she told Bernice the next morning. \"But we can't just tell everyone, either.\"", "zh": "隔天早上她跟 Bernice 說：「我們不能就這樣放著不管，但我們也不能直接告訴所有人。」"}, {"en": "They brought the whole story to Mr. Pan, from the closed door to Mr. Yang's name in the old papers.", "zh": "他們把整件事從那扇關著的門到舊資料裡楊先生的名字，全部告訴了潘老師。"}, {"en": "Mr. Pan was quiet for a long moment before he spoke.", "zh": "潘老師沉默了好一會兒才開口。"}, {"en": "\"You found a case,\" he said. \"But this time, the case isn't really a problem to solve.\"", "zh": "他說：「你們找到了一個案子，但這次，這個案子其實不是一個需要解決的問題。」"}, {"en": "\"So what do we do with it?\" Bernice asked.", "zh": "Bernice 問：「那我們該拿它怎麼辦？」"}, {"en": "\"You tell the story,\" Mr. Pan said. \"Just not as a mystery. As a thank-you.\"", "zh": "潘老師說：「把這個故事說出來，不是當成一個謎團，而是當成一句謝謝。」"}, {"en": "For their next episode, Coco and Bernice did not talk about clues, keys, or closed doors.", "zh": "在下一集裡，Coco 和 Bernice 沒有提到線索、鑰匙，或關著的門。"}, {"en": "Instead, they talked about a night worker named Mr. Yang, who once made sure no student had to study in the dark.", "zh": "他們談的是一位叫楊先生的夜間工友，他曾經確保沒有任何學生要在黑暗中唸書。"}, {"en": "They talked about a small machine that had quietly kept doing his job for eight years after he was gone.", "zh": "他們也談到一台小機器，在他離開之後，默默替他做了八年的工作。"}, {"en": "When the episode played in class, the room was completely silent until it ended.", "zh": "這一集在班上播放的時候，教室裡一片安靜，直到播完為止。"}, {"en": "Then someone asked a simple question: \"Can we still turn the light on for him?\"", "zh": "接著有人問了一個簡單的問題：「我們還可以繼續為他把燈點亮嗎？」"}, {"en": "Mr. Pan brought the idea to the school office, and this time nobody argued.", "zh": "潘老師把這個想法帶去學校辦公室，這次沒有人反對。"}, {"en": "The old library stayed full of boxes, but the timer was allowed to keep its small job.", "zh": "舊圖書館還是繼續拿來放東西，但那個計時器被允許繼續做它的小工作。"}, {"en": "Every night, at exactly nine fifteen, the light still turns on, and now everyone knows why.", "zh": "每天晚上九點十五分，那盞燈依然會亮起，而現在大家都知道原因了。"}, {"en": "Coco added a short line to her notebook: some cases don't end with an answer. They end with a decision.", "zh": "Coco 在筆記本上加了一行短短的字：有些案子的結局不是一個答案，而是一個決定。"}, {"en": "Bernice, for once, agreed completely. \"That's going in the show,\" she said. \"Word for word.\"", "zh": "這一次，Bernice 完全同意：「這句話要放進節目裡，」她說：「一字不改。」"}, {"en": "A week later, the Friday Box received a note that made both of them laugh out loud.", "zh": "一星期後，Friday Box 收到了一張讓他們兩個都笑出聲來的紙條。"}, {"en": "It read: \"The vending machine by the gym never runs out of my favorite drink. Even when it should be empty. Is someone helping me, or is something weird going on?\"", "zh": "紙條上寫著：「體育館旁邊的自動販賣機，永遠不會賣完我最喜歡的那款飲料，就算應該早就賣完了也一樣。是有人在幫我，還是有什麼奇怪的事在發生？」"}, {"en": "Bernice smiled right away. \"Finally,\" she said. \"A case with snacks.\"", "zh": "Bernice 立刻笑了：「終於，」她說：「一個跟零食有關的案子。」"}, {"en": "Coco couldn't help smiling too. \"Let's find out,\" she said, already reaching for her notebook.", "zh": "Coco 也忍不住笑了：「我們來查清楚吧。」她已經伸手去拿她的筆記本。"}, {"en": "Whatever the truth was this time, one thing was already clear: their little podcast had turned into something the whole school was starting to trust.", "zh": "不管這次的真相是什麼，有一件事已經很清楚：他們的小 podcast，漸漸變成了全校開始信任的東西。"}, {"en": "Mr. Tan mentioned once that Mr. Yang used to bring him hot tea and homemade cookies during long winter nights of work.", "zh": "陳先生曾提過，楊先生以前在漫長的冬夜工作時，總會帶熱茶和自製餅乾給他。"}, {"en": "Mr. Tan kept a small toolbox with a hammer, a knife, tape, and spare parts for exactly this kind of quiet, patient repair.", "zh": "陳先生有一個小工具箱，裡面放著鎚子、刀子、膠帶，還有備用零件，專門用來做這種安靜又有耐心的修理工作。"}], "quiz": [{"question": "What does Mr. Pan suggest they do with the story about Mr. Yang?", "options": ["Tell it as a thank-you, not a mystery", "Keep it completely secret forever", "Report it to the police", "Ignore it and move on"], "answer": 0}, {"question": "What does the school decide about the timer after hearing the episode?", "options": ["It is allowed to keep working every night", "It must be removed immediately", "It is sold to a museum", "It is given to Mr. Tan"], "answer": 0}, {"question": "What does \"trust\" mean?", "options": ["信任", "拒絕", "害怕", "忘記"], "answer": 0}, {"question": "What is the new mystery at the end of the chapter?", "options": ["A vending machine that never runs out of one drink", "A missing bicycle", "A broken window", "A new teacher who never talks"], "answer": 0}]}, {"level": 1, "chapter": 7, "title": "A Case With Snacks", "targetWords": [{"word": "machine", "pos": "n./v.", "zh": "機器", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "machined", "pastParticipleForm": "machined"}, {"word": "apple", "pos": "n.", tParticipleForm": "uped"}, {"word": "notebook", "pos": "n.", "zh": "筆記本", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 18}, {"word": "write", "pos": "v.", "zh": "寫", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 18, "pastForm": "wrote", "pastParticipleForm": "written"}, {"word": "down", "pos": "adv./prep./adj./n./v.", "zh": "向下", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 18, "pastForm": "downed", "pastParticipleForm": "downed"}, {"word": "short", "pos": "adj.", "zh": "短的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 18}, {"word": "plan", "pos": "n./v.", "zh": "計劃", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 18, "pastForm": "planed", "pastParticipleForm": "planed"}, {"word": "separate", "pos": "adj./v.", "zh": "分離", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 19, "pastForm": "separated", "pastParticipleForm": "separated"}, {"word": "lunch", "pos": "n./v.", "zh": "午餐", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 19, "pastForm": "lunched", "pastParticipleForm": "lunched"}, {"word": "each", "pos": "pron./adj./adv.", "zh": "每個", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 19, "pastForm": "eached", "pastParticipleForm": "eached"}, {"word": "side", "pos": "n.", "zh": "邊", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 19}, {"word": "ready", "pos": "adj./v.", "zh": "準備好", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 19, "pastForm": "readyed", "pastParticipleForm": "readyed"}], "extraHighlightWords": [{"word": "vending machine", "pos": "n.", "zh": "自動販賣機", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 0, "highlightType": "extra-high-frequency"}, {"word": "cafeteria", "pos": "n.", "zh": "自助餐廳；校園餐廳", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 19, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "The vending machine sold apples, bananas, cheese crackers, and small bottles of juice, along with the mysterious purple drink.", "zh": "那台自動販賣機賣蘋果、香蕉、起司餅乾，還有小瓶果汁，當然也有那款神秘的紫色飲料。"}, {"en": "Bernice bought a coffee and a bag of popcorn while they waited to start asking questions.", "zh": "他們準備開始問問題之前，Bernice 買了一杯咖啡和一包爆米花。"}, {"en": "The new note came with a name signed at the bottom, which almost never happened.", "zh": "這張新紙條底下還簽了名字，這種事幾乎從來沒發生過。"}, {"en": "It read: \"Ask me anything. I just want to know why my favorite drink never runs out.\"", "zh": "紙條上寫著：「你們可以問我任何問題，我只是想知道，為什麼我最喜歡的那款飲料永遠不會賣完。」"}, {"en": "\"Finally,\" Bernice said, \"a case where the person actually wants to be found.\"", "zh": "Bernice 說：「終於，一個當事人自己想被找到的案子。」"}, {"en": "Coco smiled. \"Let me guess your first idea,\" she said. \"Another secret hero, quietly keeping it stocked just for one student.\"", "zh": "Coco 笑了：「我猜猜你的第一個想法，」她說：「又是一個默默補貨、只為了一個學生的秘密英雄。」"}, {"en": "Bernice looked slightly caught. \"Maybe,\" she admitted.", "zh": "Bernice 看起來有點被說中了：「也許吧，」她承認。"}, {"en": "Mr. Pan, who happened to hear them, looked over from his desk.", "zh": "剛好聽到他們對話的潘老師，從他的桌子那邊看了過來。"}, {"en": "\"Two good cases don't make a rule,\" he said. \"Every case starts at zero.\"", "zh": "他說：「兩個好案子不代表就有規則，每個案子都要從零開始查。」"}, {"en": "So they started with the simplest question: who fills the machine, and how often?", "zh": "所以他們從最簡單的問題開始：是誰在補貨，多久補一次？"}, {"en": "The answer came from the school office again: a drink company visited every Monday and Thursday, refilling every machine the same way.", "zh": "答案又是從學校辦公室來的：一家飲料公司每星期一和星期四都會來，用一樣的方式補滿每一台機器。"}, {"en": "\"So nobody at school is secretly refilling it,\" Coco said, sounding a little upset.", "zh": "Coco 說：「所以沒有人在學校裡偷偷補貨。」她的語氣聽起來有點失落。"}, {"en": "\"That's not the real question anyway,\" Bernice said slowly. \"The real question is why it doesn't run out between Monday and Thursday.\"", "zh": "Bernice 慢慢地說：「反正那也不是真正的問題，真正的問題是，為什麼它在星期一到星期四之間不會賣完。」"}, {"en": "Every other drink in that machine sold out fast. That one stayed almost full, day after day.", "zh": "那台機器裡的其他飲料都賣得很快，只有那一款，每天都幾乎是滿的。"}, {"en": "\"Maybe it's broken,\" Coco said. \"Maybe it just looks full.\"", "zh": "Coco 說：「也許它壞了，也許只是看起來是滿的。」"}, {"en": "They checked. It wasn't broken. Students really could buy it, any time they wanted.", "zh": "他們檢查過了，並沒有壞，學生真的隨時都可以買到。"}, {"en": "\"Then people just aren't buying it,\" Bernice said. \"As simple as that.\"", "zh": "Bernice 說：「那就是根本沒有人在買，就這麼簡單。」"}, {"en": "Coco wasn't sure \"simple\" was the right word yet. \"But why not?\" she asked. \"It's someone's favorite drink.\"", "zh": "Coco 還不確定「簡單」是不是正確的說法：「但為什麼不買？」她問：「這可是有人最喜歡的飲料。」"}, {"en": "Bernice picked up her notebook and wrote down a short plan: ask ten students the same simple question.", "zh": "Bernice 拿起筆記本，寫下一個簡短的計畫：問十個學生同一個簡單問題。"}, {"en": "They separated at lunch, one on each side of the cafeteria, ready to start asking.", "zh": "午餐時間他們分開行動，一個人負責餐廳的一邊，準備開始問問題。"}], "quiz": [{"question": "What is different about this new note compared to the earlier ones?", "options": ["It has a name signed at the bottom", "It is written in a different language", "It has no words at all", "It is much longer than the others"], "answer": 0}, {"question": "What does Mr. Pan warn Coco and Bernice about?", "options": ["Two good cases don't make a rule; every case starts at zero", "They should stop making the podcast", "They should never ask the office for help", "They should always guess first"], "answer": 0}, {"question": "What does \"separate\" mean?", "options": ["分開", "結合", "購買", "忘記"], "answer": 0}, {"question": "What plan does Bernice make at the end of the chapter?", "options": ["Ask ten students the same simple question", "Buy every drink in the machine", "Ask Mr. Tan to fix the machine", "Tell the whole school right away"], "answer": 0}]}, {"level": 1, "chapter": 8, "title": "Not Every Mystery Has a Hero", "targetWords": [{"word": "hungry", "pos": "adj.", "zh": "飢餓的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "enough", "pos": "adv./adj./n." "pos": "n./v.", "zh": "開玩笑", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "joked", "pastParticipleForm": "joked"}, {"word": "real", "pos": "adj.", "zh": "真實的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26}, {"word": "simply", "pos": "adv.", "zh": "簡單地", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 26, "pastForm": "simplyed", "pastParticipleForm": "simplyed"}, {"word": "little", "pos": "adj./adv./n.", "zh": "小的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 26, "pastForm": "littled", "pastParticipleForm": "littled"}], "extraHighlightWords": [{"word": "mystery", "pos": "n.", "zh": "謎團；懸疑的事", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 5, "highlightType": "extra-high-frequency"}, {"word": "episode", "pos": "n.", "zh": "一集；事件", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 16, "highlightType": "extra-high-frequency"}, {"word": "microphone", "pos": "n.", "zh": "麥克風", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 17, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "By lunchtime, Coco was hungry enough to eat two full meals: rice, vegetables, and a bowl of hot soup.", "zh": "到了午餐時間，Coco 餓到可以吃下兩份正餐：白飯、蔬菜，還有一碗熱湯。"}, {"en": "Wei, it turned out, almost never ate breakfast, which was part of why he cared so much about his favorite drink.", "zh": "後來發現 Wei 幾乎從來不吃早餐，這也是他這麼在意那款飲料的部分原因。"}, {"en": "\"What do you think of the purple drink in the machine by the gym?\" Coco asked the first student.", "zh": "Coco 問第一個學生：「你覺得體育館那台機器裡的紫色飲料怎麼樣？」"}, {"en": "The student made a face before answering. \"Too sweet,\" he said. \"Way too sweet.\"", "zh": "那個學生回答前先做了個表情：「太甜了，」他說：「甜到不行。」"}, {"en": "The second student agreed completely. The third student had never even noticed it existed.", "zh": "第二個學生完全同意，第三個學生根本沒注意過它的存在。"}, {"en": "By the fifth answer, Bernice was laughing. \"It's not a mystery,\" she said. \"It's just a drink nobody else likes.\"", "zh": "問到第五個答案時，Bernice 已經笑了出來：「這根本不是謎團，」她說：「只是一款沒有其他人喜歡的飲料。」"}, {"en": "Coco laughed too, but she still wrote one more question in her notebook: if the answer was this simple, why did it feel like such a good case?", "zh": "Coco 也笑了，但她還是在筆記本上多寫了一個問題：如果答案這麼簡單，為什麼感覺起來卻像是一個這麼好的案子？"}, {"en": "They found the student who wrote the note, a quiet boy from another class named Wei.", "zh": "他們找到寫紙條的那個學生，另一班一個安靜的男生，名叫 Wei。"}, {"en": "\"So... nobody else likes it,\" Coco told him gently. \"That's really the whole answer.\"", "zh": "Coco 溫和地告訴他：「所以⋯⋯沒有其他人喜歡它，這就是全部的答案了。」"}, {"en": "Wei didn't look upset at all. He looked calm instead.", "zh": "Wei 一點也不覺得難過，反而看起來很平靜。"}, {"en": "\"I thought maybe the machine was going to stop selling it,\" he said. \"I check almost every day, just in case.\"", "zh": "他說：「我以為機器可能會停賣這款飲料，我幾乎每天都會去看一下，以防萬一。」"}, {"en": "\"Why would it stop selling it if it never runs out?\" Bernice asked.", "zh": "Bernice 問：「如果它永遠不會賣完，為什麼會停賣？」"}, {"en": "\"I don't know,\" Wei admitted. \"I guess I just worry about things staying the same.\"", "zh": "Wei 承認：「我不知道，我猜我只是會擔心事情能不能一直維持一樣。」"}, {"en": "For a moment, nobody said anything.", "zh": "有那麼一刻，誰都沒有開口。"}, {"en": "\"Well,\" Coco said finally, \"as long as other people keep disliking it, your drink is safe forever.\"", "zh": "Coco 最後說：「這樣的話，只要其他人繼續不喜歡它，你的飲料就永遠安全了。」"}, {"en": "Wei actually laughed, which surprised all three of them.", "zh": "Wei 真的笑了出來，這讓他們三個人都很意外。"}, {"en": "On their next episode, Coco and Bernice told this story differently from the first two.", "zh": "在下一集裡，Coco 和 Bernice 講這個故事的方式跟前兩次不一樣。"}, {"en": "\"Not every mystery has a hidden hero,\" Coco said into the microphone. \"Sometimes the answer is just: not many people share your taste, and that's fine.\"", "zh": "Coco 對著麥克風說：「不是每個謎團背後都有一個隱藏的英雄，有時候答案只是:沒有多少人跟你口味一樣,而這樣也沒關係。」"}, {"en": "Bernice added her own line. \"Also, we drank four cans of it during this investigation. It really is too sweet.\"", "zh": "Bernice 補了一句:「而且,我們在查這個案子的時候喝了四罐,真的太甜了。」"}, {"en": "The class laughed harder at that episode than at any before it.", "zh": "全班聽這一集笑得比之前任何一集都大聲。"}, {"en": "After class, Mr. Pan told them something they hadn't expected. \"Three cases,\" he said. \"And three different kinds of true.\"", "zh": "下課後,潘老師說了一句他們沒想到的話:「三個案子,」他說:「三種不同的真相。」"}, {"en": "Coco wrote his words in her notebook without fully understanding them yet.", "zh": "Coco 把他的話寫進筆記本裡,雖然還沒完全弄懂那句話的意思。"}, {"en": "That evening, the Friday Box held a single new note, shorter than any before it.", "zh": "那天傍晚,星期五箱子裡有一張新紙條,比之前任何一張都短。"}, {"en": "It said only: \"Ask about the fourth floor stairs. Nobody uses them. Nobody says why.\"", "zh": "上面只寫著:「去查查四樓的樓梯,沒有人會用它,也沒有人說為什麼。」"}, {"en": "Wei's older sister was a doctor, and she always told him breakfast was the most important meal.", "zh": "Wei 的姊姊是醫生，她總是告訴他早餐是一天中最重要的一餐。"}, {"en": "\"I'm not lazy,\" Wei said, laughing. \"I just really love that drink.\"", "zh": "Wei 笑著說：「我不是懶惰，我只是真的很愛那款飲料。」"}, {"en": "The school nurse joked that Wei's real illness was simply loving one drink a little too much.", "zh": "校護開玩笑說，Wei 真正的毛病只是太愛一款飲料而已。"}], "quiz": [{"question": "Why does nobody else buy the purple drink?", "options": ["Most students think it is too sweet", "It is too expensive", "The machine is broken", "It is against school rules"], "answer": 0}, {"question": "Why does Wei check the machine almost every day?", "options": ["He worries the drink might stop being sold", "He works for the drink company", "He is collecting the cans", "He is fixing the machine"], "answer": 0}, {"question": "What does \"admit\" mean?", "options": ["承認", "拒絕", "隱藏", "忘記"], "answer": 0}, {"question": "What does the newest note in the Friday Box ask about?", "options": ["The fourth floor stairs that nobody uses", "A missing key", "A broken window", "A new podcast episode"], "answer": 0}]}, {"level": 1, "chapter": 9, "title": "The Stairs Nobody Uses", "targetWords": [{"word": "floor", "pos": "n./v.", "zh": "地面", "phonetic": "", "level": 1, "fi  "生病的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 31}, {"word": "size", "pos": "n./v.", "zh": "尺寸", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 31, "pastForm": "sized", "pastParticipleForm": "sized"}, {"word": "jacket", "pos": "n.", "zh": "夾克", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 31}, {"word": "week", "pos": "n.", "zh": "星期", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 31}, {"word": "rainy", "pos": "adj.", "zh": "下雨的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 32}, {"word": "day", "pos": "n.", "zh": "天", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 32}, {"word": "game", "pos": "n.", "zh": "遊戲", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 32}, {"word": "chess", "pos": "n.", "zh": "棋", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 32}, {"word": "rest", "pos": "n./v.", "zh": "休息", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 32, "pastForm": "rested", "pastParticipleForm": "rested"}, {"word": "seat", "pos": "n./v.", "zh": "座位", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 32, "pastForm": "seated", "pastParticipleForm": "seated"}, {"word": "card", "pos": "n.", "zh": "卡片", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 33}, {"word": "willing", "pos": "adj.", "zh": "願意的", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 33}, {"word": "learn", "pos": "v.", "zh": "學習", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 33, "pastForm": "learned", "pastParticipleForm": "learned"}, {"word": "new", "pos": "adj.", "zh": "新的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 33}], "extraHighlightWords": [{"word": "hallway", "pos": "n.", "zh": "（室內）走廊", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 0, "highlightType": "extra-high-frequency"}, {"word": "fold", "pos": "v./n.", "zh": "摺；摺疊", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 30, "highlightType": "extra-high-frequency", "pastForm": "folded", "pastParticipleForm": "folded"}], "sentences": [{"en": "The fourth floor stairs led up a small hill of steps toward a quiet hallway with a low ceiling.", "zh": "四樓的樓梯往上通往一小段階梯，通向一條天花板很低、很安靜的走廊。"}, {"en": "Coco noticed the stairs were neither too high nor too steep, just an ordinary set of steps like any other.", "zh": "Coco 注意到那座樓梯既不會太高也不會太陡，就跟其他樓梯一樣普通。"}, {"en": "The newest note in the Friday Box was also the strangest one yet: no question, just two short sentences.", "zh": "星期五箱子裡最新的這張紙條，也是目前為止最奇怪的一張：沒有問題，只有兩句短短的話。"}, {"en": "\"Nobody uses the fourth floor stairs,\" it said. \"And nobody says why.\"", "zh": "紙條上寫著：「沒有人會用四樓的樓梯，也沒有人說為什麼。」"}, {"en": "Bernice had walked past those stairs a hundred times without really looking at them.", "zh": "Bernice 已經走過那座樓梯上百次，卻從來沒有真正看過它。"}, {"en": "When she finally stopped to look, she understood the note immediately.", "zh": "當她終於停下來看的時候，她馬上就懂了那張紙條的意思。"}, {"en": "The stairs looked completely normal, but every student walking by used the other staircase instead.", "zh": "那座樓梯看起來完全正常，但每個經過的學生都寧願繞去用另一座樓梯。"}, {"en": "\"Maybe it's closed,\" Coco said. But it wasn't. No sign, no rope, nothing stopping anyone.", "zh": "Coco 說：「也許它是關閉的。」但並沒有，沒有告示，沒有繩子，沒有任何東西擋著。"}, {"en": "They asked the first classmate they saw. \"I just don't use them,\" she said. \"Everyone knows not to.\"", "zh": "他們問了第一個遇到的同學：「我就是不用那座樓梯，」她說：「大家都知道不要用。」"}, {"en": "\"Knows what, exactly?\" Bernice asked.", "zh": "Bernice 問：「大家到底知道什麼？」"}, {"en": "The student thought for a moment. \"Someone got hurt there. A long time ago. That's what I heard.\"", "zh": "那個學生想了一下：「有人在那裡受過傷，很久以前的事了，我是聽說的。」"}, {"en": "A second student told a similar story, but with different details: a different year, a different kind of accident.", "zh": "第二個學生講了一個類似的故事，但細節不一樣：不同的年份，不同種類的意外。"}, {"en": "A third student had heard it happened at night. A fourth said it happened during a school trip, which made no sense at all.", "zh": "第三個學生聽說那件事發生在晚上，第四個學生說是在校外教學時發生的，這根本說不通。"}, {"en": "\"Four people, four stories,\" Coco said. \"None of them match.\"", "zh": "Coco 說：「四個人，四種說法，沒有一個對得上。」"}, {"en": "Bernice looked almost disappointed. \"So there's nothing really wrong with the stairs?\"", "zh": "Bernice 看起來有點失望：「所以樓梯其實根本沒問題？」"}, {"en": "\"I didn't say that,\" Coco said. \"A story with no clear start had to start somewhere.\"", "zh": "Coco 說：「我沒這麼說，一個沒有清楚起點的故事，一定是從某個地方開始的。」"}, {"en": "They brought their four different stories to Mr. Pan.", "zh": "他們把這四種不同的說法帶去給潘老師看。"}, {"en": "He read through Coco's notes carefully. \"This isn't a case about stairs,\" he said. \"It's a case about a story.\"", "zh": "他仔細讀完 Coco 的筆記：「這不是一個關於樓梯的案子，」他說：「這是一個關於故事的案子。」"}, {"en": "\"A story like this doesn't just appear,\" he added. \"Somewhere, someone told it first.\"", "zh": "他補充說：「像這樣的故事不會憑空出現，一定有人最早說過它。」"}, {"en": "\"How do we find where a story like this really began, if nobody remembers it clearly?\" Bernice asked.", "zh": "Bernice 問：「如果沒有人記得清楚，我們要怎麼找到這個故事真正開始的地方？」"}, {"en": "Mr. Pan smiled. \"You already know how,\" he said. \"You ask someone old enough to remember the beginning.\"", "zh": "潘老師笑了：「你們已經知道方法了，」他說：「去問一個老到能記得開頭的人。」"}, {"en": "Coco and Bernice looked at each other, both thinking of the same tall gray shelves in the school office.", "zh": "Coco 和 Bernice 對看了一眼，同時想到學校辦公室裡那些高高的灰色架子。"}, {"en": "The rumor even claimed a butterfly, or maybe a bug, had once flown out of the stairwell looking dangerous, which made no sense at all.", "zh": "傳言甚至說曾經有隻蝴蝶，或者是隻蟲子，從樓梯間飛出來，看起來很危險，但這根本說不通。"}, {"en": "While they asked around, Coco noticed the lost-and-found box by the office, overflowing as always.", "zh": "問來問去的時候，Coco 注意到辦公室旁邊的失物招領箱，一如往常滿到溢出來。"}, {"en": "Inside it were a camera with no battery, a pair of glasses, a child's doll, and one single glove.", "zh": "裡面有一台沒電池的相機、一副眼鏡、一個小孩的玩偶，還有一隻手套。"}, {"en": "There was also a plate with a chip in it, a dollar coin, and a cap that smelled faintly of smoke.", "zh": "還有一個缺角的盤子、一枚硬幣，還有一頂聞起來有點煙味的帽子。"}, {"en": "The notice board next to it was just as full: a test schedule, a lost ring, and a note about a canceled party.", "zh": "旁邊的公告欄一樣塞滿東西：一張考試時間表、一則遺失戒指的啟示，還有一張活動取消的通知。"}, {"en": "One notice asked, in careful handwriting, for information about a missing pet fish.", "zh": "有一張公告用工整的字跡，詢問有沒有人知道一隻走失的寵物魚。"}, {"en": "Another simply said: \"Found: one small radio, still working. Ask at the office.\"", "zh": "另一張只寫著：「拾獲：一台還能用的小型收音機，請洽辦公室。」"}, {"en": "\"People lose the strangest things,\" Bernice said, holding up a single sock with a picture of a king on it.", "zh": "Bernice 拿起一隻印著國王圖案的襪子說：「大家掉的東西還真奇怪。」"}, {"en": "Coco pointed out a torn map of the whole school area, folded into a small square.", "zh": "Coco 指出一張折成小方塊、已經破損的整個校區地圖。"}, {"en": "\"Somebody's parents must be worried sick,\" she said, looking at a child-sized jacket nobody had claimed in weeks.", "zh": "她看著一件好幾週都沒人來認領的兒童外套說：「不知道是哪家父母正擔心得不得了。」"}, {"en": "On rainy days, indoor recess meant board games, quiet chess, or simply resting at their seats.", "zh": "下雨天的室內下課時間，大家不是玩桌遊、下棋，就是安靜地坐在座位上休息。"}, {"en": "One classmate always brought a deck of cards and taught anyone willing to learn a new game.", "zh": "有個同學總是帶一副撲克牌，教任何願意學的人玩新遊戲。"}], "quiz": [{"question": "What is strange about the fourth floor stairs?", "options": ["Nobody uses them, though nothing is physically wrong", "They are painted a strange color", "They lead to a locked room", "They are much longer than normal stairs"], "answer": 0}, {"question": "What do the four students' stories have in common?", "options": ["None of the details match each other", "They all agree on the same year", "They all mention a ghost", "They all refuse to talk"], "answer": 0}, {"question": "What does \"clear\" mean?", "options": ["清楚的", "骯髒的", "危險的", "便宜的"], "answer": 0}, {"question": "What does Mr. Pan suggest they do next?", "options": ["Ask someone old enough to remember how the story began", "Give up the case", "Ask the principal to close the stairs", "Recor : "adv.", "zh": "或許", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 20, "pastForm": "maybed", "pastParticipleForm": "maybed"}, {"word": "end", "pos": "n./v.", "zh": "結尾", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 20, "pastForm": "ended", "pastParticipleForm": "ended"}, {"word": "live", "pos": "v./adj.", "zh": "居住", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 20, "pastForm": "lived", "pastParticipleForm": "lived"}, {"word": "show", "pos": "v./n.", "zh": "展示", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 22, "pastForm": "showed", "pastParticipleForm": "showed"}, {"word": "laugh", "pos": "v./n.", "zh": "笑", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23, "pastForm": "laughed", "pastParticipleForm": "laughed"}, {"word": "number", "pos": "n./v.", "zh": "數位", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23, "pastForm": "numbered", "pastParticipleForm": "numbered"}, {"word": "note", "pos": "n./v.", "zh": "筆記", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23, "pastForm": "noted", "pastParticipleForm": "noted"}, {"word": "case", "pos": "n./v.", "zh": "案件", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23, "pastForm": "cased", "pastParticipleForm": "cased"}, {"word": "turn", "pos": "v./n.", "zh": "轉動", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23, "pastForm": "turned", "pastParticipleForm": "turned"}, {"word": "matter", "pos": "n./v.", "zh": "事", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23, "pastForm": "mattered", "pastParticipleForm": "mattered"}, {"word": "later", "pos": "adv.", "zh": "之後", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 23, "pastForm": "latered", "pastParticipleForm": "latered"}], "extraHighlightWords": [{"word": "episode", "pos": "n.", "zh": "一集；事件", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 19, "highlightType": "extra-high-frequency"}], "sentences": [{"en": "The old file had a torn page and faded ink, but the important line was still easy enough to read.", "zh": "那份舊資料有一頁破損、墨水也褪色了，但重要的那一行字還是看得清楚。"}, {"en": "\"People don't keep paper records like this anymore,\" the secretary said, closing the drawer carefully.", "zh": "秘書小心地關上抽屜說：「現在已經沒有人這樣保存紙本紀錄了。」"}, {"en": "The school secretary looked a little surprised to see them again so soon.", "zh": "學校秘書看到他們這麼快又出現，看起來有點意外。"}, {"en": "\"The fourth floor stairs?\" she said. \"That's a new one. Let me check.\"", "zh": "她說：「四樓樓梯？這個我倒是第一次聽人來問，我查查看。」"}, {"en": "She pulled out an even older stack of papers than before, soft and a little yellow at the edges.", "zh": "她拿出了一疊比上次還要更舊的紙，邊角又軟又有點泛黃。"}, {"en": "\"Here it is,\" she said. \"Fourteen years ago, one step on that staircase was damaged.\"", "zh": "她說：「找到了，十四年前，那座樓梯有一個階梯壞了。」"}, {"en": "\"A student stepped on it and fell. Not badly hurt, but scared enough to tell everyone.\"", "zh": "「一個學生踩到那裡跌倒了，傷得不重，但嚇得跟大家講了這件事。」"}, {"en": "\"The school fixed the step within a week,\" the secretary said. \"It was never a problem again.\"", "zh": "秘書說：「學校一個星期內就把階梯修好了，之後再也沒出過問題。」"}, {"en": "Coco looked up. \"A week? But people still avoid those stairs today.\"", "zh": "Coco 抬起頭：「一個星期？但現在大家還是避開那座樓梯。」"}, {"en": "\"The step was fixed,\" the secretary said, \"but the story wasn't.\"", "zh": "秘書說：「階梯修好了，但故事沒有跟著修好。」"}, {"en": "She explained that the student who fell told younger students. Those students told the next class after them.", "zh": "她解釋，跌倒的那個學生把這件事告訴了學弟妹，那些學生又告訴了下一屆的同學。"}, {"en": "Each time the story was told, a small piece changed: the year, the time of day, how badly someone got hurt.", "zh": "每講一次，故事就會有一小部分跟著變：年份、時間、受傷的程度。"}, {"en": "\"By now,\" the secretary said, \"almost nobody knows the real step was fixed fourteen years ago.\"", "zh": "秘書說：「到現在，幾乎沒有人知道那個真正的階梯十四年前就修好了。」"}, {"en": "Bernice sat back in her chair. \"So we're not looking for something broken,\" she said. \"We're looking for a story that never got the news.\"", "zh": "Bernice 靠著椅背坐下：「所以我們不是在找一個壞掉的東西，」她說：「我們是在找一個從來沒有收到消息的故事。」"}, {"en": "Coco smiled at that sentence and wrote it down word for word.", "zh": "Coco 對這句話笑了笑，一字不改地把它寫了下來。"}, {"en": "That afternoon, they walked the fourth floor stairs together, step by step, all the way up.", "zh": "那天下午，他們一起一階一階走上四樓的樓梯，一路走到頂。"}, {"en": "Nothing sounded strange. Nothing moved. It felt exactly like every other staircase in the school.", "zh": "沒有任何奇怪的聲音，什麼都沒有晃動，感覺就跟學校裡任何一座樓梯一樣。"}, {"en": "\"Fourteen years is a long time to be afraid of nothing,\" Bernice said.", "zh": "Bernice 說：「為了什麼都沒有的事害怕十四年，真的太久了。」"}, {"en": "\"It's not nothing,\" Coco said. \"It's a good story. Good stories are hard to stop.\"", "zh": "Coco 說：「不是什麼都沒有，這是一個好故事，好故事很難停下來。」"}, {"en": "That gave them an idea for their next episode: not just telling the truth, but explaining why the wrong story lasted so long.", "zh": "這給了他們下一集的靈感：不只是說出真相，還要解釋為什麼錯的故事能流傳這麼久。"}, {"en": "Mr. Pan, hearing their plan, added one more idea. \"Maybe end the episode by walking the stairs live, on the recording.\"", "zh": "潘老師聽到他們的計畫，補充了一個點子：「或許可以在錄音的時候，直接走一次樓梯給大家聽。」"}, {"en": "Bernice smiled at the idea immediately.", "zh": "Bernice 立刻對這個點子露出笑容。"}, {"en": "\"Fourteen steps, fourteen years,\" she said. \"That sounds like a good line for the show.\"", "zh": "她說：「十四階，十四年，這句話當節目台詞很不錯。」"}, {"en": "Coco laughed and added the number to her notes, just in case it turned out to matter later.", "zh": "Coco 笑了，把這個數字也記進筆記裡，以防之後真的用得上。"}], "quiz": [{"question": "What really happened fourteen years ago?", "options": ["A step on the stairs was damaged and a student fell, but was not badly hurt", "A teacher disappeared on the stairs", "The stairs were closed for a whole year", "A fire started near the stairs"], "answer": 0}, {"question": "Why do students still avoid the stairs today, even though the step was fixed long ago?", "options": ["The story kept being told and changed as it passed from class to class", "The stairs are still officially closed", "The school never allowed students back", "The stairs were rebuilt somewhere else"], "answer": 0}, {"question": "What does \"avoid\" mean?", "options": ["避免", "喜歡", "修理", "尋找"], "answer": 0}, {"question": "What idea does Mr. Pan suggest for the next episode?", "options": ["Walk the stairs live during the recording", "Close the stairs permanently", "Interview only teachers", "Skip the episode entirely"], "answer": 0}]}, {"level": 1, "chapter": 11, "title": "Fourteen Steps", "targetWords": [{"word": "climb", "pos": "v./n.", "zh": "爬", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "climbed", "pastParticipleForm": "climbed"}, {"word": "stair", "pos": "n.", "zh": "樓梯", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "live", "pos": "v./adj.", "zh": "居住", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "lived", "pastParticipleForm": "lived"}, {"word": "record", "pos": "n./v.", "zh": "記錄", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 0, "pastForm": "recorded", "pastParticipleForm": "recorded"}, {"word": "more", "pos": "adj./pron./adv.", "zh": "更多的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "mored", "pastParticipleForm": "mored"}, {"word": "courage", "pos": "n.", "zh": "勇氣", "phonetic": "", "level": 2, "firstOccurrenceSentenceIndex": 0}, {"word": "expect", "pos": "v.", "zh": "預計", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "expected", "pastParticipleForm": "expected"}, {"word": "leg", "pos": "n.", "zh": "腿", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "little", "pos": "adj./adv./n.", "zh": "小的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "littled", "pastParticipleForm": "littled"}, {"word": "weak", "pos": "adj.", "zh": "虛弱的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "first", "pos": "n./adv./adj.", "zh": "第一的", "phonetic": "", "level": 1, "firstOccur {"word": "episode", "pos": "n.", "zh": "一集；事件", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 2, "highlightType": "extra-high-frequency"}, {"word": "microphone", "pos": "n.", "zh": "麥克風", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 3, "highlightType": "extra-high-frequency"}, {"word": "fold", "pos": "v./n.", "zh": "摺；摺疊", "phonetic": "", "level": "extra", "firstOccurrenceSentenceIndex": 22, "highlightType": "extra-high-frequency", "pastForm": "folded", "pastParticipleForm": "folded"}], "sentences": [{"en": "Climbing the stairs live on the recording took more courage than Coco expected; her legs felt a little weak at first.", "zh": "錄音時直接爬樓梯，比 Coco 想像中還需要勇氣，一開始她的腿還有點軟。"}, {"en": "By the top step, though, her voice sounded brave and strong, not weak at all.", "zh": "但到了最上面一階，她的聲音聽起來很勇敢、很堅定，一點也不軟弱。"}, {"en": "On Friday, the new episode began with footsteps instead of words.", "zh": "星期五，新的一集用腳步聲代替開場白開始。"}, {"en": "Coco held the microphone close as she climbed, one step at a time. \"One. Two. Three.\"", "zh": "Coco 邊爬邊把麥克風拿近身邊：「一，二，三。」"}, {"en": "Bernice spoke from a few steps behind. \"For fourteen years, almost nobody has done this.\"", "zh": "Bernice 從後面幾階跟著說：「十四年來，幾乎沒有人做過這件事。」"}, {"en": "\"Fourteen years ago, one step here was damaged,\" Coco said. \"It was fixed within a week.\"", "zh": "Coco 說：「十四年前，這裡有一階壞了，一個星期內就修好了。」"}, {"en": "\"But the story stayed broken for much longer than the step ever was.\"", "zh": "「但這個故事壞掉的時間，比那個階梯本身還要長得多。」"}, {"en": "By the tenth step, her voice was calm. By the fourteenth, she was standing at the top, smiling.", "zh": "走到第十階時，她的聲音已經很平靜了，走到第十四階時，她已經站在最上面，笑著。"}, {"en": "\"Fourteen steps,\" she said. \"Completely normal. Completely safe.\"", "zh": "她說：「十四階，完全正常，完全安全。」"}, {"en": "When the episode played in class, a few students laughed quietly.", "zh": "這一集在班上播放的時候，有幾個學生小聲地笑了。"}, {"en": "\"I've avoided those stairs since I was twelve,\" one student admitted. \"I don't even know why anymore.\"", "zh": "一個學生坦承：「我從十二歲就開始躲那座樓梯，連自己都不知道為什麼了。」"}, {"en": "By lunchtime, three students had already walked up the fourth floor stairs, just to see for themselves.", "zh": "到了午餐時間，已經有三個學生特地走了一次四樓樓梯，只為了親自確認。"}, {"en": "Mr. Pan watched all this from his desk and said nothing, but he looked happy about it.", "zh": "潘老師從他的桌子那邊看著這一切，什麼都沒說，但看起來很開心。"}, {"en": "\"Three cases were about something true that people forgot,\" he said later. \"This one was about something false that people remembered too well.\"", "zh": "他後來說：「前三個案子，都是關於一件被大家遺忘的真相，這一個，是關於一個被大家記得太清楚的假話。」"}, {"en": "Coco wrote his sentence down, then added her own line underneath it.", "zh": "Coco 把他這句話寫下來，又在底下加了自己的一句話。"}, {"en": "\"Maybe every story in this school is either a truth someone forgot, or a fear someone never checked.\"", "zh": "「也許這間學校裡的每個故事，不是一個被遺忘的真相，就是一個從來沒有人去查證的害怕。」"}, {"en": "Bernice read the line over her shoulder and laughed softly.", "zh": "Bernice 從她肩膀後面看到這句話，輕輕笑了。"}, {"en": "\"That's a big sentence for a Friday afternoon,\" she said.", "zh": "她說：「星期五下午講這麼大的一句話，有點嚴肅耶。」"}, {"en": "\"Maybe,\" Coco said. \"But I think it's true.\"", "zh": "Coco 說：「也許吧，但我覺得是真的。」"}, {"en": "That evening, the Friday Box was almost empty, just one small piece of paper at the bottom.", "zh": "那天傍晚，星期五箱子裡幾乎是空的，只有底部一張小紙片。"}, {"en": "It was not a question this time, not even a full sentence. Just three words: \"Room 306. Listen.\"", "zh": "這次不是問題，甚至不是一個完整的句子，只有三個字：「306教室，聽。」"}, {"en": "Bernice looked at Coco. \"Well,\" she said, \"that's new.\"", "zh": "Bernice 看著 Coco：「嗯，」她說：「這個倒是新鮮。」"}, {"en": "Coco folded the paper carefully and put it in her notebook, right next to the growing list of Friday Box cases.", "zh": "Coco 小心地把紙折好，放進筆記本裡，就放在越來越長的 Friday Box 案件清單旁邊。"}, {"en": "Whatever was waiting in Room 306, they both knew one thing for certain: they were not going to walk away from it.", "zh": "不管306教室裡藏著什麼，他們兩個都很確定一件事：他們不會轉身走開。"}, {"en": "A few students admitted they used to be so afraid of the stairs that they would walk the long way around, even in bad weather.", "zh": "有幾個學生承認，他們以前太害怕那座樓梯，就算天氣不好也會繞遠路走。"}, {"en": "\"I once ran the whole way around in the rain just to avoid it,\" one boy said, a little embarrassed.", "zh": "一個男生有點不好意思地說：「我甚至曾經冒雨繞了一大圈，就為了不走那座樓梯。」"}], "quiz": [{"question": "What do Coco and Bernice do for the new episode?", "options": ["Walk up the fourth floor stairs while recording", "Interview the school principal", "Close the stairs forever", "Ask students to vote online"], "answer": 0}, {"question": "How does the class react to the episode?", "options": ["Some students walk the stairs themselves to check", "Nobody believes the story", "The school bans the podcast", "Everyone stops using every staircase"], "answer": 0}, {"question": "What does \"certain\" mean?", "options": ["確定的", "危險的", "便宜的", "安靜的"], "answer": 0}, {"question": "What does the newest note in the Friday Box say?", "options": ["\"Room 306. Listen.\"", "\"Help me find my key.\"", "\"The cafeteria is too loud.\"", "\"Who broke the clock?\""], "answer": 0}]}, {"level": 1, "chapter": 12, "title": "Room 306", "targetWords": [{"word": "room", "pos": "n./v.", "zh": "房間", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "roomed", "pastParticipleForm": "roomed"}, {"word": "old", "pos": "adj.", "zh": "老的", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "piano", "pos": "n.", "zh": "鋼琴", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "corner", "pos": "n.", "zh": "角落", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "nobody", "pos": "pron./n.", "zh": "沒有人", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "play", "pos": "v./n.", "zh": "玩", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0, "pastForm": "played", "pastParticipleForm": "played"}, {"word": "year", "pos": "n.", "zh": "年", "phonetic": "", "level": 1, "firstOccurrenceSentenceIndex": 0}, {"word": "next", "pos": "adj./a
